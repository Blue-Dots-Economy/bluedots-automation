# =============================================================================
# Environment inputs — edit values in this section only.
# Everything inside global: references these anchors.
# =============================================================================

# ── Identity ──────────────────────────────────────────────────────────────────
_building_block: &building_block "purple-dots"
_environment:    &environment    "dev"


_signals_public_hosts: &signals_public_hosts
  - "example.domain.com"
  - "example.domain.com"
# For multi-domain host-routing set: "host1.com=network/domain;host2.com=network/domain"
# Leave empty for single-host mode (hostBindings will be omitted entirely).
_signals_host_bindings: &signals_host_bindings ""

# Network this deployment serves — SHARED by signals (NETWORK_CONFIG_LOCAL_FILE,
# schema mount, VITE_NETWORK_NAME) AND aggregator (aggregatorNetwork).
# served_domains lists the per-domain bindings the signals API serves (roles
# differ per network, so set it explicitly).
_network: &network "blue_dot"

# Brand skin over the network — SHARED by signals (VITE_BRAND_NAME) AND
# aggregator (aggregatorBrand). A brand is a UI/config skin over a network; it
# does NOT change the upstream network identity (driven by _network above).
# Leave empty for the standard dots. Examples: "upsdm" (over blue_dot),
# "onetac" (over orange_dot). Switching brand = change this one value + redeploy.
_brand: &brand ""
_signals_served_domains: &signals_served_domains "blue_dot/provider,blue_dot/seeker"
_aggregator_host: &aggregator_host "aggregator.domain.com"
_grafana_host:    &grafana_host    "monitoring.domain.com"

# ── AWS ───────────────────────────────────────────────────────────────────────
_cloud_storage_region: &cloud_storage_region "ap-south-1"

# ── EKS ───────────────────────────────────────────────────────────────────────
_eks_cluster_version:    &eks_cluster_version    "1.35"
_eks_node_instance_type: &eks_node_instance_type "m6a.large"
_eks_node_disk_size_gb:  &eks_node_disk_size_gb  30
_eks_node_count_min:     &eks_node_count_min     1
_eks_node_count_max:     &eks_node_count_max     2

# ── SMTP (shared by notification, aggregator, and monitoring) ─────────────────
# smtp_password must be a Gmail App Password:
#   Google Account → Security → 2-Step Verification → App passwords
_smtp_host:         &smtp_host         "smtp.gmail.com"
_smtp_port:         &smtp_port         587
_smtp_user:         &smtp_user         "sender@example.com"
_smtp_password:     &smtp_password     "changeme"
_smtp_from_display: &smtp_from_display "Blue Dots"

# ── MSG91 (shared by notification service and aggregator) ────────────────────
_msg91_auth_key:    &msg91_auth_key    "changeme"
_msg91_template_id: &msg91_template_id "changeme"

# ── Alert recipients ──────────────────────────────────────────────────────────
_alert_email:             &alert_email             "alerts@example.com"
_aggregator_admin_emails: &aggregator_admin_emails "admin@example.com"
_signals_google_maps_api_key: &signals_google_maps_api_key ""

# ── API rate limiting (Kong) ────────────────────────────────────────────────────
# Master ON/OFF toggle for per-API rate limiting across signals + aggregator. When
# false, no per-API KongPlugins/Ingresses are created and traffic falls back to the
# per-service catch-all limit (nothing breaks).
_api_rate_limit_enabled: &api_rate_limit_enabled false
# Per-IP requests/min applied to EVERY API via Kong per-API rate limiting.
# SINGLE SOURCE OF TRUTH: drives the signals/aggregator/search charts' rate-limit
# config AND the monitoring per-API alert thresholds (warn >80%, info <20%).
_api_rate_limit_per_minute: &api_rate_limit_per_minute 600


# =============================================================================
# Structure — do not edit below unless you know what you're changing.
# =============================================================================

global:
  building_block: *building_block
  environment:    *environment

  signals_public_hosts:   *signals_public_hosts
  signals_host_bindings:  *signals_host_bindings
  network:                *network
  signals_served_domains: *signals_served_domains

  # ── Signals Helm config ────────────────────────────────────────────────────
  publicHosts: *signals_public_hosts
  aggregator_host: *aggregator_host

  # ── Aggregator Helm config ─────────────────────────────────────────────────
  # These keys match the aggregator chart's schema at root level so global-values.yaml
  # can be passed directly via -f without any transformation.
  publicHost:         *aggregator_host
  aggregatorNetwork:  *network
  aggregatorBrand:    *brand
  signalstackBaseUrl: 'http://signals-api.signals.svc.cluster.local:2742'
  signalstack:
    # Set after signals is deployed: SELECT id FROM organization WHERE type='network_service';
    # Required before first aggregator login — SIGNALSTACK_ORG_NOT_REGISTERED otherwise.
    actingOrgId: ""
  dataPlatform:
    namespace:       common-services
    postgresService: common-services-postgresql
    redisService:    common-services-redis-master

  # ── API rate limiting (Kong) — shared by the signals/aggregator/search charts'
  # per-API rate-limit config AND the monitoring per-API alert thresholds.
  # Edit _api_rate_limit_enabled / _api_rate_limit_per_minute above.
  apiRateLimit:
    enabled:       *api_rate_limit_enabled
    defaultMinute: *api_rate_limit_per_minute

  cloud_storage_region: *cloud_storage_region

  # Network configuration (optional - set create_network: false to use an existing VPC)
  create_network: true
  # vpc_id: ""                         # If create_network: false, provide existing VPC ID
  # private_subnet_ids: []             # If create_network: false
  # public_subnet_ids: []              # If create_network: false
  # vpc_cidr: "10.0.0.0/16"            # CIDR block for the new VPC
  # ingress_cidr_blocks: ["0.0.0.0/0"] # Allowed CIDRs for HTTP/HTTPS inbound security group

  # Each subnet defaults to /24; cidr_netnum is the block index for that size.
  #   /16 VPC: 101 → 10.0.101.0/24 | 102 → 10.0.102.0/24 | 201 → 10.0.201.0/24
  # Set prefix_length per subnet for a different size — then cidr_netnum indexes
  # blocks OF THAT size (e.g. a /28 in a /22 → cidr_netnum is the /28 index 0..63).
  subnet_config:
    public-a:
      type: public
      availability_zone: "a"
      cidr_netnum: 0
    public-b:
      type: public
      availability_zone: "b"
      cidr_netnum: 1
    # Private subnets for the RDS DB subnet group (RDS needs ≥2 AZs). Kept /24 here
    # for a roomy /16 VPC; for a tight VPC add `prefix_length: 28` to shrink them.
    private-a:
      type: private
      availability_zone: "a"
      cidr_netnum: 2
    private-b:
      type: private
      availability_zone: "b"
      cidr_netnum: 3
    # ── Private EKS node subnets ─────────────────────────────────────────────
    # Named 'private-eks-*' so the EKS module selects them automatically and
    # ignores the smaller RDS /28 subnets above.
    # For a /16 VPC: cidr_netnum 4/5 gives 10.0.4.0/24 + 10.0.5.0/24 (251 IPs each).
    # For a tight /22 VPC: use prefix_length: 25 with cidr_netnum 6/7 instead.
    private-eks-a:
      type: private
      availability_zone: "a"
      cidr_netnum: 4
    private-eks-b:
      type: private
      availability_zone: "b"
      cidr_netnum: 5

  # NAT Gateway — ~$32/month per AZ. Required for private nodes to pull images.
  nat_gateway_enabled: true

  eks_cluster_version:    *eks_cluster_version
  eks_node_instance_type: *eks_node_instance_type
  eks_node_disk_size_gb:  *eks_node_disk_size_gb
  eks_node_count_min:     *eks_node_count_min   # set to 2 for multi-AZ (one node per AZ)
  eks_node_count_max:     *eks_node_count_max
  # eks_node_count_desired: 3
  # eks_ebs_csi_addon_version: "v1.28.0-eksbuild.1"

  # Pin the node group to specific subnet(s)/AZ. EBS volumes are AZ-locked, so a
  # single-node cluster must keep its node in the AZ where its volumes live.
  #   single-AZ (cheapest): ["private-eks-a"] + eks_node_count_min: 1
  #   multi-AZ HA:          ["private-eks-a","private-eks-b"] + eks_node_count_min: 2
  # Leave unset to spread nodes across all private-eks-* subnets.
  # eks_node_subnet_keys:
  #   - "private-eks-a"

  # ── EKS API endpoint access ──────────────────────────────────────────────────
  # Controls whether kubectl reaches the API server from the internet or VPC only.
  #
  # State 1 — Public only (default when lines are commented out)
  # eks_endpoint_public_access:  true
  # eks_endpoint_private_access: false
  #
  # State 2 — Both on  ← safe transition; enable this FIRST before disabling public
  # eks_endpoint_public_access:  true
  # eks_endpoint_private_access: true
  #
  # State 3 — Private only  ← set ONLY after Pritunl VPN is confirmed working
  # eks_endpoint_public_access:  false
  # eks_endpoint_private_access: true

  # Include the Pritunl + Bastion VMs in a full `terragrunt run --all` apply (i.e.
  # `./install.sh` / create_tf_resources). true = included (default); false = skipped.
  # Either way they remain individually runnable via apply_tf_pritunl / apply_tf_bastion.
  pritunl_enabled: true
  bastion_enabled: true

  # ── Pritunl VPN ──────────────────────────────────────────────────────────────
  # Uncomment to override the default instance type (t3.small is the minimum —
  # MongoDB needs ~1 GB RAM; t3.nano will be unstable).
  # pritunl_instance_type: "t3.small"
  #
  # Restrict WHO can reach the VPN (and therefore all cluster access, since the bastion +
  # EKS are VPN-only). Set to the allowed office/home public IPs as /32 CIDRs. Find each
  # location's IP from that network: `curl ifconfig.me`. Comment the whole block out to
  # leave the VPN open to the internet (0.0.0.0/0).
  # ⚠️ Home ISP IPs change — a changed IP locks the VPN out until you update this list
  # (recover by editing the SG in the AWS console; that is not VPN-gated). Apply changes
  # with `bash install.sh apply_tf_pritunl` (updates the SG in place, no VM recreation).
  # NOTE: the office IP below is the shared baseline (always allowed). A deployment for a
  # DIFFERENT org/office should replace it with their own IP.
  pritunl_ingress_cidrs:
    - "49.207.54.70/32"       # office (baseline — always allowed)
    # - "198.51.100.20/32"    # per-env: add home/other IPs, then apply_tf_pritunl
    # - "192.0.2.30/32"

  # ── Bastion host (deployment workstation) ────────────────────────────────────
  # Lives in a private subnet — only reachable after connecting Pritunl VPN, then SSH.
  # Developers `git pull` and run helm/kubectl FROM here; laptops never touch the EKS
  # API directly. Its IAM role is mapped into the cluster via an EKS access entry
  # (ClusterAdmin), so kubectl/helm work after `aws eks update-kubeconfig`.
  #
  # Access = SSH public keys. Each dev runs `ssh-keygen -t ed25519` and pastes their
  # PUBLIC key line below. Private keys stay with the owner — never in the repo or state.
  # This same list also authorizes SSH into the Pritunl host for its one-time setup.
  # Add/remove a line + re-apply (bastion/pritunl) to grant/revoke a developer.
  # bastion_authorized_keys:
  #   - "ssh-ed25519 AAAA... alice@laptop"
  #   - "ssh-ed25519 AAAA... bob@laptop"
  # bastion_instance_type: "t3.medium"  # default — runs helm/kubectl/git (t3.medium floor; nano OOMs on helm template)
  # bastion_key_name: "my-key-pair"     # optional AWS key pair; not needed when using bastion_authorized_keys

  # ── RDS (managed Postgres) ──────────────────────────────────────────────────
  # Single multi-tenant instance; databases/roles created by the common-services
  # bootstrap Job, not here. Lives in the private subnets above.
  rds_instance_class:        "db.t4g.micro"   # bump to db.t4g.small (+ multi_az) for prod
  rds_allocated_storage:     20               # gp3 minimum
  rds_max_allocated_storage: 50               # storage autoscaling cap (0 disables)
  rds_engine_version:        "17"
  rds_multi_az:              false            # set true for prod HA
  rds_backup_retention_days: 7                # automated backups + PITR
  # rds_deletion_protection: true             # default true
  # rds_skip_final_snapshot: false            # default false
  # rds_force_ssl: false                      # default false; true to require TLS

  # Key becomes suffix: <building_block>-<environment>-<account_id>-<key>
  buckets:
    public:
      type: public
      cors_enabled: true
    # private:
    #   type: private
    #   versioning_enabled: true

  cors_max_age_seconds: 3000

  service_account_subjects:
    - "system:serviceaccount:aggregator:aggregator-api"
    - "system:serviceaccount:aggregator:aggregator-worker"

  # ── Notification service (signals) ─────────────────────────────────────────
  signals_google_maps_api_key:   *signals_google_maps_api_key
  notification_gmail_user:       *smtp_user
  notification_gmail_pass:       *smtp_password
  notification_msg91_auth_key:   *msg91_auth_key
  notification_msg91_template_id: *msg91_template_id

  # ── Aggregator mail (secrets only — non-secret config moved to root sections below) ──
  aggregator_smtp_user:     *smtp_user
  aggregator_smtp_password: *smtp_password
  aggregator_msg91_auth_key: *msg91_auth_key

  # CloudWatch observability (Container Insights add-on)
  enable_cloudwatch_observability: false
  cloudwatch_enabled_log_types:
    - api
    - audit
    - authenticator
    - controllerManager
    - scheduler

prometheus:
  grafana:
    grafana.ini:
      server:
        domain: *grafana_host
    ingress:
      hosts:
        - *grafana_host
      tls:
        - secretName: grafana-tls
          hosts:
            - *grafana_host

# ── SMTP (shared by notification, aggregator, and monitoring) ─────────────────
# smtp_password must be a Gmail App Password:
#   Google Account → Security → 2-Step Verification → App passwords
alerting:
  email:
    enabled: false
    smtpHost: "smtp.gmail.com:587"  # host:port combined — keep in sync with _smtp_host/_smtp_port
    smtpFrom: *smtp_user
    smtpAuthUsername: *smtp_user
    smtpAuthPassword: *smtp_password
    to: *alert_email
  discord:
    # Set enabled: true and replace webhooks to activate Discord notifications.
    # Create one webhook per channel: Channel Settings → Integrations → Webhooks.
    enabled: false
    criticalWebhook: "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"
    warningWebhook:  "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"
    infoWebhook:     "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"

# =============================================================================
# Aggregator chart config (non-sensitive, passed directly via -f global-values.yaml)
# Keys match the aggregator chart's schema so no transformation is needed.
# =============================================================================

aggregator-api:
  adminEmails: *aggregator_admin_emails

mail:
  provider: smtp  # smtp | ses
  smtp:
    host: *smtp_host
    port: *smtp_port
    from: *smtp_user
    fromDisplay: *smtp_from_display
    secure: false
    starttls: true
    auth: true

keycloak:
  msg91TemplateId: *msg91_template_id

# =============================================================================
# Signals chart config (non-sensitive, passed directly via -f global-values.yaml)
# Keys match the signals chart's schema so no transformation is needed.
# Computed values (API_DOMAIN, ALLOWED_ORIGINS, NETWORK_CONFIG_LOCAL_FILE) are
# in global-cloud-values.yaml (require HCL list indexing / join).
# =============================================================================

api:
  secrets:
    create: true
    existingSecret: dpg-api-secrets
    notificationKeyId: "dpg-api-client"
  config:
    NOTIFICATION_SERVICE_ENDPOINT: "http://signals-notification-service:3000"
    SERVED_DOMAINS: *signals_served_domains
  postgres:
    host: common-services-postgresql.common-services.svc.cluster.local
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  schemas:
    networks:
      - *network

ui:
  apiUpstream: "http://signals-api:2742"
  uiVariant: "signals"
  # hostBindings is conditionally set in global-cloud-values.yaml — only emitted
  # when signals_host_bindings is non-empty, to avoid nginx conflicting parameter error.
  runtimeConfig:
    VITE_DEFAULT_VIEW_MODE: "map"
    VITE_MAP_PROVIDER: "google-maps"
    VITE_GOOGLE_MAPS_API_KEY: *signals_google_maps_api_key
    VITE_ACTION_POLL_INTERVAL_MS: "30000"
    VITE_NETWORK_NAME: *network
    VITE_BRAND_NAME: *brand
    VITE_ANALYTICS_GA_ID: ""
    VITE_MAP_DEFAULT_CENTER: "" # update the lat,long if any specific area has to be focused on maps.
    VITE_MAP_DEFAULT_ZOOM: "5"
  service:
    port: 80
    targetPort: 80

notification-service:
  secrets:
    create: true
    existingSecret: ""
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  internalSecrets:
    create: true
    existingSecret: ""
    fileName: internal-secrets.json
    mountPath: /app/config

match-score:
  secrets:
    create: true
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  configFiles:
    create: true
    aiProvidersFileName: ai.providers.local.json
    aiProvidersJson: |
      {
        "providers": {
          "openai": {
            "apiKey": "REPLACE_WITH_OPENAI_API_KEY"
          },
          "gemini": {
            "apiKey": "REPLACE_WITH_GEMINI_API_KEY"
          }
        }
      }

search:
  # In-cluster Postgres by default. The opentofu RDS overlay
  # (global-cloud-values.yaml) overrides search.postgres.host with the managed
  # endpoint when RDS is provisioned (postgres_host non-empty).
  postgres:
    host: common-services-postgresql.common-services.svc.cluster.local
    port: 5432
  secrets:
    create: true
    existingSecret: dpg-search-secrets
    data:
      POSTGRES_USER: "dpg"
      POSTGRES_DB: "dpg"
      EMBEDDING_API_KEY: ""

rdsRelay:
  enabled: false