# ── Infrastructure Configuration ────────────────────────────────────────────────────
_building_block: &building_block "purple-dots"
_environment:    &environment    "dev"
_cloud_storage_region: &cloud_storage_region "ap-south-1"
_eks_cluster_version:    &eks_cluster_version    "1.35"
_eks_node_instance_type: &eks_node_instance_type "m6a.xlarge"
_eks_node_disk_size_gb:  &eks_node_disk_size_gb  40
_eks_node_capacity_type: &eks_node_capacity_type "ON_DEMAND"
_eks_node_count_min:     &eks_node_count_min     2
_eks_node_count_max:     &eks_node_count_max     6

# ── Signals / Aggregator hostnames ─────────────────────────────────────────────
_signals_public_hosts: &signals_public_hosts
  - "example.domain.com"
  - "example.domain.com"
_signals_host_bindings: &signals_host_bindings ""

_aggregator_host: &aggregator_host "aggregator.domain.com"
_grafana_host:    &grafana_host    "monitoring.domain.com"

_signals_served_domains: &signals_served_domains "blue_dot/provider,blue_dot/seeker"

_network: &network "blue_dot"
_brand: &brand ""

# ── SMTP Configuration ────────────────────────────────────────────────────
_smtp_host:         &smtp_host         "smtp.gmail.com"
_smtp_port:         &smtp_port         587
_smtp_user:         &smtp_user         "sender@example.com"
_smtp_password:     &smtp_password     "changeme" # smtp_password must be a Gmail App Password: eg. "abcd efgh ijkl mnop"
_smtp_from_display: &smtp_from_display "Blue Dots"
_aggregator_admin_emails: &aggregator_admin_emails "admin@example.com"
support_email: &support_email "support@example.com"

# ── API rate limiting (Kong) ────────────────────────────────────────────────────
_api_rate_limit_enabled: &api_rate_limit_enabled false # Master ON/OFF toggle for per-API rate limiting across signals + aggregator.
_api_rate_limit_per_minute: &api_rate_limit_per_minute 600 # Per-IP requests/min applied to EVERY API via Kong per-API rate limiting.
# ── OTP-abuse rate limiting (Kong) ──────────────────────────────────────────────
_otp_rate_limit_enabled:    &otp_rate_limit_enabled    true
_signals_otp_per_minute:    &signals_otp_per_minute    5    # a real login needs ~1–3
_aggregator_otp_per_minute: &aggregator_otp_per_minute 20   # login flow ≈ 3 POSTs/login


global:
  # ══════════════════════════════════════════════════════════════════════════
  # Infra-consumed — read by terragrunt (opentofu/aws/_common/*.hcl) to
  # provision AWS resources. Not read by any Helm chart directly.
  # ══════════════════════════════════════════════════════════════════════════
  building_block: *building_block
  environment:    *environment
  cloud_storage_region: *cloud_storage_region

  # Feeds output-file's CORS/network locals (signals_allowed_origins, network).
  signals_public_hosts:   *signals_public_hosts
  signals_host_bindings:  *signals_host_bindings
  network:                *network
  signals_served_domains: *signals_served_domains

  # Used by storage.hcl to compute the S3 bucket's CORS allowed origins.
  # (Same anchor also feeds the Helm-consumed publicHost below.)
  aggregator_host: *aggregator_host

  # Network configuration (optional - set create_network: false to use an existing VPC)
  create_network: true
  # vpc_id: ""                         # If create_network: false, provide existing VPC ID
  # private_subnet_ids: []             # If create_network: false
  # public_subnet_ids: []              # If create_network: false
  vpc_cidr: "10.0.0.0/22"              # CIDR for the VPC (must be /16 to /22)
  # ingress_cidr_blocks: ["0.0.0.0/0"] # Allowed CIDRs for HTTP/HTTPS inbound security group

  # Each subnet defaults to /24; cidr_netnum is the block index for that size.
  #   /22 VPC: 0 → 10.0.0.0/24 | 1 → 10.0.1.0/24 | 2 → 10.0.2.0/24 | 3 → 10.0.3.0/24
  # Set prefix_length per subnet for a different size — then cidr_netnum indexes
  # blocks OF THAT size (e.g. a /28 in a /22 → cidr_netnum is the /28 index 0..63).
  subnet_config:
    public-a:
      type: public
      availability_zone: "a"
      cidr_netnum: 0
    public-b:
      type: public
      availability_zone: "b"
      cidr_netnum: 1
    # Private subnets for the RDS DB subnet group (RDS needs ≥2 AZs). Sized /28 here
    # (11 usable IPs — plenty for RDS). Remove `prefix_length: 28` to make them /24.
    private-a:
      type: private
      availability_zone: "a"
      cidr_netnum: 32
      prefix_length: 28
    private-b:
      type: private
      availability_zone: "b"
      cidr_netnum: 33
      prefix_length: 28
    # ── Private EKS node subnets ─────────────────────────────────────────────
    private-eks-a:
      type: private
      availability_zone: "a"
      cidr_netnum: 6
    private-eks-b:
      type: private
      availability_zone: "b"
      cidr_netnum: 7

  nat_gateway_enabled: true

  eks_cluster_version:    *eks_cluster_version
  eks_node_instance_type: *eks_node_instance_type
  eks_node_disk_size_gb:  *eks_node_disk_size_gb
  eks_node_capacity_type: *eks_node_capacity_type
  eks_node_count_min:     *eks_node_count_min   # set to 2 for multi-AZ (one node per AZ)
  eks_node_count_max:     *eks_node_count_max
  # eks_node_count_desired: 3
  # eks_ebs_csi_addon_version: "v1.28.0-eksbuild.1"

  # Pin the node group to specific subnet(s)/AZ. EBS volumes are AZ-locked, so a
  # single-node cluster must keep its node in the AZ where its volumes live.
  #   single-AZ (cheapest): ["private-eks-a"] + eks_node_count_min: 1
  #   multi-AZ HA:          ["private-eks-a","private-eks-b"] + eks_node_count_min: 2
  # Leave unset to spread nodes across all private-eks-* subnets.
  # eks_node_subnet_keys:
  #   - "private-eks-a"

  # ── EKS API endpoint access ──────────────────────────────────────────────────
  eks_endpoint_public_access:  true
  eks_endpoint_private_access: false

# ── Pritunl VPN  & bastion host ────────────────────────────────────────────────────────
  pritunl_enabled: true
  bastion_enabled: true

  # ── Pritunl VPN ──────────────────────────────────────────────────────────────
  # override the default instance type (t3.small is the minimum —
  # MongoDB needs ~1 GB RAM; t3.nano will be unstable).
  pritunl_instance_type: "t3.small"
  #
  # Restrict WHO can reach the VPN (office, home, etc.) — the bastion host is in a private subnet and only reachable after connecting to the VPN. Add/remove lines + re-apply (pritunl) to grant
  pritunl_ingress_cidrs:
    - "106.51.118.115/32"       # office (baseline — always allowed)
    # - "198.51.100.20/32"    # per-env: add home/other IPs, then apply_tf_pritunl
    # - "192.0.2.30/32"

  # Access = SSH public keys. Each dev runs `ssh-keygen -t ed25519` and pastes their
  # Add/remove a line + re-apply (bastion/pritunl) to grant/revoke a developer.
  bastion_authorized_keys:
    - "ssh-ed25519 AAAA... alice@laptop"
    - "ssh-ed25519 AAAA... bob@laptop"
  bastion_instance_type: "t3.medium"  # default — runs helm/kubectl/git (t3.medium floor; nano OOMs on helm template)
  # bastion_key_name: "my-key-pair"     # optional AWS key pair; not needed when using bastion_authorized_keys

  # ── RDS (managed Postgres) ──────────────────────────────────────────────────
  rds_instance_class:        "db.t4g.micro"   # bump to db.t4g.small (+ multi_az) for prod
  rds_allocated_storage:     20               # gp3 minimum
  rds_max_allocated_storage: 50               # storage autoscaling cap (0 disables)
  rds_engine_version:        "17"
  rds_multi_az:              false            # set true for prod HA
  rds_backup_retention_days: 7                # automated backups + PITR
  # rds_deletion_protection: true             # default true
  # rds_skip_final_snapshot: false            # default false
  # rds_force_ssl: false                      # default false; true to require TLS

  # Key becomes suffix: <building_block>-<environment>-<account_id>-<key>
  buckets:
    public:
      type: public
      cors_enabled: true
    # private:
    #   type: private
    #   versioning_enabled: true
    # Dedicated PRIVATE bucket for the Signals non-PII S3 export
    # (helm/signals/charts/s3-export). Uncomment to provision it — its presence
    # auto-creates the write-only exporter IRSA role in the iam module.
    # Bucket name: <building_block>-<environment>-<account_id>-signals-export
    # signals-export:
    #   type: private
    #   versioning_enabled: true

  cors_max_age_seconds: 3000

  service_account_subjects:
    - "system:serviceaccount:aggregator:aggregator-api"
    - "system:serviceaccount:aggregator:aggregator-worker"

  # Exporter ServiceAccount subject bound to the signals-s3-export IRSA role
  # (only relevant when the signals-export bucket above is provisioned). Must
  # match s3-export.serviceAccount.name below. The iam module already defaults
  # to this value — uncomment only to override.
  # signals_export_sa_subject: "system:serviceaccount:signals:signals-s3-export"

  # Read by terragrunt and passed through to the output-file module, which
  # bakes them into the generated global-secrets.yaml (GMAIL_USER / smtpUser).
  # The corresponding passwords/keys are UPDATE_THIS_VALUE placeholders set
  # directly in that generated file — not here.
  notification_gmail_user: *smtp_user
  aggregator_smtp_user:    *smtp_user

  # CloudWatch observability (Container Insights add-on)
  enable_cloudwatch_observability: false
  cloudwatch_enabled_log_types:
    - api
    - controllerManager
    - scheduler
    # - audit
    # - authenticator

  # ══════════════════════════════════════════════════════════════════════════
  # Helm-consumed — passed straight through to the signals + aggregator charts
  # via `.Values.global.*` (shared umbrella-chart values). Not read by
  # terragrunt.
  # ══════════════════════════════════════════════════════════════════════════
  publicHosts: *signals_public_hosts
  orgHierarchyEnabled: true

  publicHost:         *aggregator_host
  aggregatorNetwork:  *network
  aggregatorBrand:    *brand
  signalstackBaseUrl: 'http://signals-api.signals.svc.cluster.local:2742'
  signalstack:
    # Set after signals is deployed: SELECT id FROM organization WHERE type='network_service';
    actingOrgId: ""
  dataPlatform:
    namespace:       common-services
    postgresService: common-services-postgresql
    redisService:    common-services-redis-master

  # ── API rate limiting (Kong) — shared by the signals/aggregator/search charts'
  apiRateLimit:
    enabled:       *api_rate_limit_enabled
    defaultMinute: *api_rate_limit_per_minute

  # ── OTP-abuse rate limiting (Kong) — signals api + aggregator keycloak charts
  otpRateLimit:
    enabled:          *otp_rate_limit_enabled
    signalsMinute:    *signals_otp_per_minute
    aggregatorMinute: *aggregator_otp_per_minute

prometheus:
  grafana:
    grafana.ini:
      server:
        domain: *grafana_host
    ingress:
      hosts:
        - *grafana_host
      tls:
        - secretName: grafana-tls
          hosts:
            - *grafana_host

alerting:
  email:
    enabled: false
    smtpHost: "smtp.gmail.com:587"  # host:port combined — keep in sync with _smtp_host/_smtp_port
    smtpFrom: *smtp_user
    smtpAuthUsername: *smtp_user
    smtpAuthPassword: *smtp_password
    to: "CHANGE-ME"
  discord:
    enabled: false
    criticalWebhook: "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"
    warningWebhook:  "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"
    infoWebhook:     "https://discord.com/api/webhooks/CHANGE-ME/CHANGE-ME"

# =============================================================================
# Aggregator chart config (non-sensitive, passed directly via -f global-values.yaml)
# Keys match the aggregator chart's schema so no transformation is needed.
# =============================================================================

aggregator-api:
  adminEmails: *aggregator_admin_emails
  supportEmail: *support_email

mail:
  provider: smtp  # smtp | ses
  smtp:
    host: *smtp_host
    port: *smtp_port
    from: *smtp_user
    fromDisplay: *smtp_from_display
    secure: false
    starttls: true
    auth: true

keycloak:
  # msg91TemplateId is set directly in the generated global-secrets.yaml
  # (UPDATE_THIS_VALUE placeholder) — not here.

# =============================================================================
# Signals chart config (non-sensitive, passed directly via -f global-values.yaml)
# Keys match the signals chart's schema so no transformation is needed.
# Computed values (API_DOMAIN, ALLOWED_ORIGINS, NETWORK_CONFIG_LOCAL_FILE) are
# in global-cloud-values.yaml (require HCL list indexing / join).
# =============================================================================

api:
  secrets:
    create: true
    existingSecret: dpg-api-secrets
    notificationKeyId: "dpg-api-client"
  config:
    NOTIFICATION_SERVICE_ENDPOINT: "http://signals-notification-service:3000"
    NOTIFICATION_FROM_EMAIL: *smtp_user
    SERVED_DOMAINS: *signals_served_domains
    # ── Self-signup gate + login channels ──────────────
    SELF_SIGNUP_MODE: "gated"           # gated (default) = public self-signup OFF; allowed = on
    LOGIN_CHANNELS: "phone,email"       # allowed OTP channels; subset of: email, phone
    PEER_AUTH_MODE: "permissive"
    SUPPORT_EMAIL: *support_email          # contact-form emails go here (sender must be SPF/DMARC authorized)
    CONSENT_SUPPORT_EMAIL: "hello@bluedotseconomy.org"  # rendered into T&C/Privacy/Grievances consent copy at load
    PII_LOCATION_JITTER_MIN_METERS: "100"   # 50–1000, min <= max; jitter reuses SIGNALS_PII_KEY
    PII_LOCATION_JITTER_MAX_METERS: "250"   # 50–1000
  postgres:
    host: common-services-postgresql.common-services.svc.cluster.local
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  schemas:
    networks:
      - *network
    consentNetwork: *network
    consentBrand: ""

ui:
  apiUpstream: "http://signals-api:2742"
  uiVariant: "signals"
  runtimeConfig:
    VITE_DEFAULT_VIEW_MODE: "map"
    VITE_MAP_PROVIDER: "google-maps"
    VITE_ACTION_POLL_INTERVAL_MS: "30000"
    VITE_NETWORK_NAME: *network
    VITE_BRAND_NAME: *brand
    VITE_ANALYTICS_GA_ID: ""
    VITE_MAP_DEFAULT_CENTER: "" # update the lat,long if any specific area has to be focused on maps.
    VITE_MAP_DEFAULT_ZOOM: "5"
    VITE_PROFILE_FETCH_LIMIT: "1000"
    VITE_ENABLED_LANGUAGES: "en,hi" # default: "en,hi" (English, Hindi). Add more codes for additional languages.
  service:
    port: 80
    targetPort: 80

notification-service:
  secrets:
    create: true
    existingSecret: ""
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  internalSecrets:
    create: true
    existingSecret: ""
    fileName: internal-secrets.json
    mountPath: /app/config

match-score:
  secrets:
    create: true
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
  configFiles:
    create: true
    aiProvidersFileName: ai.providers.local.json
    aiProvidersJson: |
      {
        "providers": {
          "openai": {
            "apiKey": "REPLACE_WITH_OPENAI_API_KEY"
          },
          "gemini": {
            "apiKey": "REPLACE_WITH_GEMINI_API_KEY"
          }
        }
      }

search:
  # In-cluster Postgres by default. The opentofu RDS overlay
  # (global-cloud-values.yaml) overrides search.postgres.host with the managed
  # endpoint when RDS is provisioned (postgres_host non-empty).
  postgres:
    host: common-services-postgresql.common-services.svc.cluster.local
    port: 5432
  secrets:
    create: true
    existingSecret: dpg-search-secrets
    data:
      POSTGRES_USER: "dpg"
      POSTGRES_DB: "dpg"
      EMBEDDING_API_KEY: ""

rdsRelay:
  enabled: false

# ── s3-export — Signals non-PII export CronJob (adhoc-scripts image) ─────────
# OPT-IN per environment (chart default OFF). To enable:
#   1. Uncomment the `signals-export` bucket under global.buckets, then
#      `tofu apply` storage + iam. The iam module then creates the write-only
#      exporter role: arn:aws:iam::<account_id>:role/<building_block>-<environment>-signals-s3-export
#   2. Create the read-only DB role signals_export_ro on the signals database
#      and a K8s Secret (below) holding its DATABASE_URL.
#   3. Set enabled: true, fill the role-arn / bucket / instances below.
# Details: helm/signals/charts/s3-export + adhoc-scripts/signals-s3-export README.
s3-export:
  enabled: false
  image:
    repository: ghcr.io/blue-dots-economy/adhoc-scripts/signals-s3-export
    tag: "main"          # pin to an immutable sha/semver tag per environment
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: signals-s3-export        # must match global.signals_export_sa_subject
    annotations:
      # Replace <account_id> / <building_block> / <environment> (iam module output).
      eks.amazonaws.com/role-arn: arn:aws:iam::<account_id>:role/<building_block>-<environment>-signals-s3-export
  s3:
    bucket: <building_block>-<environment>-<account_id>-signals-export
    region: ap-south-1
  networks:
    - blue_dot
  instances: []
  #  - id: blue_dot_dev
  #    network: blue_dot
  #    schedule: "0 0,12 * * *"       # midnight + noon IST (cronJob.timeZone)
  #    existingDatabaseSecret: signals-s3-export-db-blue-dot-dev