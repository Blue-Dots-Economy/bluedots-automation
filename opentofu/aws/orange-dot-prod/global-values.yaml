# =============================================================================
# Environment inputs — edit values in this section only.
# Everything inside global: references these anchors.
# =============================================================================

# ── Identity ──────────────────────────────────────────────────────────────────
_building_block: &building_block "purple-dots"
_environment:    &environment    "dev"

# ── Hostnames ─────────────────────────────────────────────────────────────────
_signals_ui_host: &signals_ui_host "purpledots.servehalflife.com"
_aggregator_host: &aggregator_host "aggregator.servehalflife.com"

# ── AWS ───────────────────────────────────────────────────────────────────────
_cloud_storage_region: &cloud_storage_region "ap-south-1"

# ── EKS ───────────────────────────────────────────────────────────────────────
_eks_cluster_version:    &eks_cluster_version    "1.35"
_eks_node_instance_type: &eks_node_instance_type "m6a.large"
_eks_node_disk_size_gb:  &eks_node_disk_size_gb  30
_eks_node_count_min:     &eks_node_count_min     1
_eks_node_count_max:     &eks_node_count_max     2

# ── SMTP (shared by notification, aggregator, and monitoring) ─────────────────
# smtp_password must be a Gmail App Password:
#   Google Account → Security → 2-Step Verification → App passwords
_smtp_user:     &smtp_user     "sender@example.com"
_smtp_password: &smtp_password "changeme"

# ── MSG91 (shared by notification service and aggregator) ────────────────────
_msg91_auth_key:    &msg91_auth_key    "changeme"
_msg91_template_id: &msg91_template_id "changeme"

# ── Alert recipients ──────────────────────────────────────────────────────────
_monitoring_alert_email:  &monitoring_alert_email  "alerts@example.com"
_aggregator_admin_emails:   &aggregator_admin_emails   "admin@example.com"
_aggregator_msg91_template_id: &aggregator_msg91_template_id "changeme"
_signals_google_maps_api_key: &signals_google_maps_api_key ""

# =============================================================================
# Structure — do not edit below unless you know what you're changing.
# =============================================================================

global:
  building_block: *building_block
  environment:    *environment

  signals_ui_host: *signals_ui_host
  aggregator_host: *aggregator_host

  cloud_storage_region: *cloud_storage_region

  # Network configuration (optional - set create_network: false to use an existing VPC)
  create_network: true
  # vpc_id: ""                         # If create_network: false, provide existing VPC ID
  # private_subnet_ids: []             # If create_network: false
  # public_subnet_ids: []              # If create_network: false
  # vpc_cidr: "10.0.0.0/16"            # CIDR block for the new VPC
  # ingress_cidr_blocks: ["0.0.0.0/0"] # Allowed CIDRs for HTTP/HTTPS inbound security group

  # cidr_netnum is the offset for cidrsubnet(vpc_cidr, 8, N):
  #   101 → 10.0.101.0/24 | 102 → 10.0.102.0/24 | 201 → 10.0.201.0/24, etc.
  subnet_config:
    public-a:
      type: public
      availability_zone: "a"
      cidr_netnum: 101
    public-b:
      type: public
      availability_zone: "b"
      cidr_netnum: 102
    # private-a:
    #   type: private
    #   availability_zone: "a"
    #   cidr_netnum: 201
    # private-b:
    #   type: private
    #   availability_zone: "b"
    #   cidr_netnum: 202

  # NAT Gateway — costs ~$32/month per AZ. Only needed when private subnets exist.
  # nat_gateway_enabled: false

  eks_cluster_version:    *eks_cluster_version
  eks_node_instance_type: *eks_node_instance_type
  eks_node_disk_size_gb:  *eks_node_disk_size_gb
  eks_node_count_min:     *eks_node_count_min
  eks_node_count_max:     *eks_node_count_max
  # eks_endpoint_public_access: true
  # eks_endpoint_private_access: false
  # eks_node_count_desired: 3
  # eks_ebs_csi_addon_version: "v1.28.0-eksbuild.1"

  # Key becomes suffix: <building_block>-<environment>-<account_id>-<key>
  buckets:
    public:
      type: public
      cors_enabled: true
    # private:
    #   type: private
    #   versioning_enabled: true

  cors_max_age_seconds: 3000

  service_account_subjects:
    - "system:serviceaccount:aggregator:aggregator-api"
    - "system:serviceaccount:aggregator:aggregator-worker"

  # ── Notification service (signals) ─────────────────────────────────────────
  signals_google_maps_api_key:   *signals_google_maps_api_key
  notification_gmail_user:       *smtp_user
  notification_gmail_pass:       *smtp_password
  notification_msg91_auth_key:   *msg91_auth_key
  notification_msg91_template_id: *msg91_template_id

  # ── Aggregator mail ──────────────────────────────────────────────────────────
  aggregator_smtp_user:     *smtp_user
  aggregator_smtp_password: *smtp_password
  aggregator_smtp_from:     *smtp_user
  aggregator_admin_emails:      *aggregator_admin_emails
  aggregator_msg91_auth_key:    *msg91_auth_key
  aggregator_msg91_template_id: *aggregator_msg91_template_id

  # ── Monitoring stack ────────────────────────────────────────────────────────
  monitoring_alert_email:   *monitoring_alert_email
  monitoring_smtp_from:     *smtp_user
  monitoring_smtp_password: *smtp_password

  # CloudWatch observability (Container Insights add-on)
  enable_cloudwatch_observability: false
  cloudwatch_enabled_log_types:
    - api
    - audit
    - authenticator
    - controllerManager
    - scheduler
