name: build-tei-image

# Build and publish the TEI image with BAAI/bge-m3 baked in (see
# docker/tei-bge-m3/Dockerfile). Rarely changes — runs on manual dispatch and
# when the Dockerfile/pinned revision changes on develop/feature.
on:
  workflow_dispatch:
  push:
    branches: [develop, feature]
    paths:
      - docker/tei-bge-m3/**
      - .github/workflows/build-tei-image.yml

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker/tei-bge-m3
          push: true
          # Stable tag the search-embeddings chart pins to, plus an immutable sha tag.
          tags: |
            ghcr.io/blue-dots-economy/tei-bge-m3:cpu-1.7-bge-m3
            ghcr.io/blue-dots-economy/tei-bge-m3:sha-${{ github.sha }}
