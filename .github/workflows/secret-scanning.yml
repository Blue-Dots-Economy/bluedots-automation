name: Secret Scanning

on:
  pull_request:
    branches: [main, develop, feature]
  push:
    branches: [main, develop, feature]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Critical for infra repos: detects AWS keys, passwords, SSH keys, API tokens
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --source /repo --redact --verbose
