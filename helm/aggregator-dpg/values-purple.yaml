# Purple Dot network overlay.
# Apply on top of base values:
#   helm upgrade aggregator helm/aggregator-dpg \
#     -f helm/aggregator-dpg/values.yaml \
#     -f helm/aggregator-dpg/values-purple.yaml

# Aggregator API + worker point at purple_dot config tree.
global:
  aggregatorNetwork: purple_dot
  publicHost: purpledots.servehalflife.com

# Theme image baked with purple brand vars (see
# `infra/keycloak/build-theme-image.sh purple_dot v1`).
keycloak:
  themesInit:
    image: vinodbbhorge/aggregator-kc-theme
    tag: purple_dot-develop
