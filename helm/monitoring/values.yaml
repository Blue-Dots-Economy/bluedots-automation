# =============================================================================
# Monitoring umbrella chart values.
# We enable components one at a time as we understand and configure them.
# =============================================================================

# ── Phase 1: Prometheus ───────────────────────────────────────────────────────
# "prometheus" here is the alias we gave kube-prometheus-stack in Chart.yaml.
# Everything under this key flows into the kube-prometheus-stack subchart.
prometheus:
  enabled: true

  # ── Disable bundled components we don't need yet ──────────────────────────
  grafana:
    enabled: false      # bundled Grafana — will enable in a later step

  windowsMonitoring:
    enabled: false      # Windows node metrics — not needed (Linux cluster)

  # ── Keep these enabled — our alerts depend on the metrics they collect ─────
  nodeExporter:
    enabled: true       # hardware metrics per node (CPU, memory, disk)

  kubeStateMetrics:
    enabled: true       # Kubernetes object metrics (pod restarts, replicas)

  # ── Prometheus instance config ────────────────────────────────────────────
  # Note the double nesting: outer "prometheus" = our alias,
  # inner "prometheus" = the Prometheus component inside kube-prometheus-stack.
  prometheus:
    prometheusSpec:
      # How often Prometheus visits each target's /metrics endpoint.
      # 30s is the standard default — enough granularity without overloading targets.
      scrapeInterval: 30s

      # How often Prometheus evaluates all alert rules.
      # Keeping this equal to scrapeInterval so rules are checked on fresh data.
      evaluationInterval: 30s

      # These three flags control which ServiceMonitors, PodMonitors, and
      # PrometheusRules Prometheus discovers.
      #
      # Default (true): only discover objects created by THIS helm chart.
      # Problem: when we add postgres-exporter, redis-exporter, or app-level
      # ServiceMonitors in signals/aggregator/common-services namespaces later,
      # Prometheus would never find them.
      #
      # Setting to false: discover ALL ServiceMonitors, PodMonitors, and
      # PrometheusRules from ALL namespaces in the cluster.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

      # How long to keep metrics before auto-deleting old data.
      # 7 days is enough for active debugging. Increase later if needed
      # (gp3 supports volume expansion without recreating the PVC).
      retention: 7d

      # Persistent storage for metrics data.
      # gp3 = newer AWS EBS SSD (default StorageClass on this cluster).
      # ALLOWVOLUMEEXPANSION=true on gp3 means we can resize later if needed.
      # 20Gi is enough for 7 days of metrics from a small-medium cluster.
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  # ── Custom alert rules ───────────────────────────────────────────────────
  # additionalPrometheusRulesMap creates a new PrometheusRule CRD in the cluster.
  # The Operator picks it up automatically — no Prometheus restart needed.
  # Rules are grouped by concern: infra (node-level), then per application namespace.
  # Pod CPU/memory alerts require resource limits to be set on containers —
  # if limits are not set, the join produces no result and the alert stays INACTIVE.
  additionalPrometheusRulesMap:
    bluedots-cluster-alerts:
      groups:

        # ── Infrastructure (node-level) ──────────────────────────────────────
        # These apply cluster-wide — no namespace filter needed.
        - name: infra.alerts
          rules:
            - alert: NodeHighCPUUsage
              expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
              for: 5m
              labels:
                severity: warning
                group: infra
              annotations:
                summary: "High CPU on {{ $labels.instance }}"
                description: "CPU usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 80%)"

            - alert: NodeHighMemoryUsage
              expr: 100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100) > 80
              for: 5m
              labels:
                severity: warning
                group: infra
              annotations:
                summary: "High memory on {{ $labels.instance }}"
                description: "Memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 80%)"

            - alert: NodeHighDiskUsage
              expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 80
              for: 10m
              labels:
                severity: warning
                group: infra
              annotations:
                summary: "High disk on {{ $labels.instance }}"
                description: "Disk usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} at / (threshold: 80%)"

            - alert: NodeNotReady
              expr: kube_node_status_condition{condition="Ready",status="true"} == 0
              for: 5m
              labels:
                severity: critical
                group: infra
              annotations:
                summary: "Node {{ $labels.node }} is not Ready"
                description: "Node {{ $labels.node }} has been NotReady for more than 5 minutes"

        # ── Signals namespace ────────────────────────────────────────────────
        - name: signals.alerts
          rules:
            - alert: PodHighRestartCount
              expr: increase(kube_pod_container_status_restarts_total{namespace="signals"}[1h]) > 5
              for: 0m
              labels:
                severity: warning
                group: signals
              annotations:
                summary: "Pod {{ $labels.pod }} restarting in signals"
                description: "Container {{ $labels.container }} restarted {{ $value | printf \"%.0f\" }} times in the last hour"

            - alert: PodOOMKilled
              expr: kube_pod_container_status_last_terminated_reason{namespace="signals",reason="OOMKilled"} == 1
              for: 0m
              labels:
                severity: warning
                group: signals
              annotations:
                summary: "OOMKilled: signals/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} was killed because it exceeded its memory limit"

            # Requires memory limits to be set on the container.
            - alert: PodHighCPUUsage
              expr: (rate(container_cpu_usage_seconds_total{namespace="signals",container!="",container!="POD"}[2m]) / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="signals",resource="cpu"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: signals
              annotations:
                summary: "High CPU: signals/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its CPU limit"

            # Requires memory limits to be set on the container.
            - alert: PodHighMemoryUsage
              expr: (container_memory_working_set_bytes{namespace="signals",container!="",container!="POD"} / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="signals",resource="memory"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: signals
              annotations:
                summary: "High memory: signals/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its memory limit"

            - alert: DeploymentUnavailable
              expr: kube_deployment_status_replicas_available{namespace="signals"} == 0
              for: 5m
              labels:
                severity: critical
                group: signals
              annotations:
                summary: "Deployment signals/{{ $labels.deployment }} has 0 replicas"
                description: "Deployment {{ $labels.deployment }} has had 0 available replicas for more than 5 minutes"

        # ── Aggregator namespace ─────────────────────────────────────────────
        - name: aggregator.alerts
          rules:
            - alert: PodHighRestartCount
              expr: increase(kube_pod_container_status_restarts_total{namespace="aggregator"}[1h]) > 5
              for: 0m
              labels:
                severity: warning
                group: aggregator
              annotations:
                summary: "Pod {{ $labels.pod }} restarting in aggregator"
                description: "Container {{ $labels.container }} restarted {{ $value | printf \"%.0f\" }} times in the last hour"

            - alert: PodOOMKilled
              expr: kube_pod_container_status_last_terminated_reason{namespace="aggregator",reason="OOMKilled"} == 1
              for: 0m
              labels:
                severity: warning
                group: aggregator
              annotations:
                summary: "OOMKilled: aggregator/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} was killed because it exceeded its memory limit"

            - alert: PodHighCPUUsage
              expr: (rate(container_cpu_usage_seconds_total{namespace="aggregator",container!="",container!="POD"}[2m]) / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="aggregator",resource="cpu"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: aggregator
              annotations:
                summary: "High CPU: aggregator/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its CPU limit"

            - alert: PodHighMemoryUsage
              expr: (container_memory_working_set_bytes{namespace="aggregator",container!="",container!="POD"} / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="aggregator",resource="memory"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: aggregator
              annotations:
                summary: "High memory: aggregator/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its memory limit"

            - alert: DeploymentUnavailable
              expr: kube_deployment_status_replicas_available{namespace="aggregator"} == 0
              for: 5m
              labels:
                severity: critical
                group: aggregator
              annotations:
                summary: "Deployment aggregator/{{ $labels.deployment }} has 0 replicas"
                description: "Deployment {{ $labels.deployment }} has had 0 available replicas for more than 5 minutes"

        # ── Common-services namespace ────────────────────────────────────────
        - name: common-services.alerts
          rules:
            - alert: PodHighRestartCount
              expr: increase(kube_pod_container_status_restarts_total{namespace="common-services"}[1h]) > 5
              for: 0m
              labels:
                severity: warning
                group: common-services
              annotations:
                summary: "Pod {{ $labels.pod }} restarting in common-services"
                description: "Container {{ $labels.container }} restarted {{ $value | printf \"%.0f\" }} times in the last hour"

            - alert: PodOOMKilled
              expr: kube_pod_container_status_last_terminated_reason{namespace="common-services",reason="OOMKilled"} == 1
              for: 0m
              labels:
                severity: warning
                group: common-services
              annotations:
                summary: "OOMKilled: common-services/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} was killed because it exceeded its memory limit"

            - alert: PodHighCPUUsage
              expr: (rate(container_cpu_usage_seconds_total{namespace="common-services",container!="",container!="POD"}[2m]) / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="common-services",resource="cpu"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: common-services
              annotations:
                summary: "High CPU: common-services/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its CPU limit"

            - alert: PodHighMemoryUsage
              expr: (container_memory_working_set_bytes{namespace="common-services",container!="",container!="POD"} / on(namespace,pod,container) kube_pod_container_resource_limits{namespace="common-services",resource="memory"}) * 100 > 80
              for: 5m
              labels:
                severity: warning
                group: common-services
              annotations:
                summary: "High memory: common-services/{{ $labels.pod }}"
                description: "Container {{ $labels.container }} is using {{ $value | printf \"%.1f\" }}% of its memory limit"

            - alert: DeploymentUnavailable
              expr: kube_deployment_status_replicas_available{namespace="common-services"} == 0
              for: 5m
              labels:
                severity: critical
                group: common-services
              annotations:
                summary: "Deployment common-services/{{ $labels.deployment }} has 0 replicas"
                description: "Deployment {{ $labels.deployment }} has had 0 available replicas for more than 5 minutes"

  # ── Alertmanager email template ──────────────────────────────────────────
  # templateFiles are mounted into /etc/alertmanager/config/ inside the pod.
  # Define named Go templates here; reference them in email_configs below.
  # The html template produces a styled card email instead of the bare default.
  alertmanager:
    templateFiles:
      bluedots.tmpl: |-
        {{ define "email.default.subject" -}}
        [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }} · {{ .GroupLabels.namespace | default "cluster" }}
        {{- end }}

        {{ define "email.default.html" -}}
        <!DOCTYPE html>
        <html>
        <head>
        <meta charset="UTF-8">
        <style>
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;margin:0;padding:24px}
          .card{max-width:620px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.12)}
          .hdr{padding:20px 24px;border-bottom:1px solid #e8e8e8}
          .hdr h2{margin:0;font-size:17px;color:#1a1a2e}
          .hdr .sub{margin-top:4px;font-size:13px;color:#888}
          .item{padding:16px 24px;border-bottom:1px solid #f0f0f0}
          .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase}
          .critical{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e}
          .warning{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
          .resolved{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
          .title{font-size:15px;font-weight:600;color:#262626;margin:8px 0 4px}
          .desc{font-size:13px;color:#595959;margin:0 0 12px}
          .meta{background:#fafafa;border-radius:4px;padding:10px 12px}
          .row{display:flex;gap:8px;font-size:12px;padding:2px 0}
          .k{color:#8c8c8c;min-width:120px}
          .v{color:#262626;font-family:monospace}
          .ts{font-size:12px;color:#bfbfbf;margin-top:10px}
          .footer{padding:14px 24px;text-align:center;font-size:12px;color:#bfbfbf;background:#fafafa}
        </style>
        </head>
        <body>
        <div class="card">
          <div class="hdr">
            <h2>Blue Dots — Alert Notification</h2>
            <div class="sub">
              {{- if gt (.Alerts.Firing | len) 0 }}{{ .Alerts.Firing | len }} firing{{ end -}}
              {{- if and (gt (.Alerts.Firing | len) 0) (gt (.Alerts.Resolved | len) 0) }} · {{ end -}}
              {{- if gt (.Alerts.Resolved | len) 0 }}{{ .Alerts.Resolved | len }} resolved{{ end }}
            </div>
          </div>
          {{ range .Alerts.Firing -}}
          <div class="item">
            <span class="badge {{ .Labels.severity }}">{{ .Labels.severity }}</span>
            <div class="title">{{ .Annotations.summary }}</div>
            <div class="desc">{{ .Annotations.description }}</div>
            <div class="meta">
              {{ range .Labels.SortedPairs -}}
              <div class="row"><span class="k">{{ .Name }}</span><span class="v">{{ .Value }}</span></div>
              {{ end -}}
            </div>
            <div class="ts">Fired: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</div>
          </div>
          {{ end -}}
          {{ range .Alerts.Resolved -}}
          <div class="item">
            <span class="badge resolved">resolved</span>
            <div class="title">{{ .Annotations.summary }}</div>
            <div class="desc">{{ .Annotations.description }}</div>
            <div class="ts">Resolved: {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}</div>
          </div>
          {{ end -}}
          <div class="footer">Blue Dots Economy &nbsp;·&nbsp; test-dev-cluster</div>
        </div>
        </body>
        </html>
        {{- end }}

    # Full alertmanager routing config. Setting this key REPLACES the default
    # config entirely, so we must explicitly include:
    #   - null route for Watchdog/InfoInhibitor (suppress heartbeat emails)
    #   - inhibit_rules (critical suppresses warning/info for same namespace)
    config:
      global:
        resolve_timeout: 5m
        # Gmail SMTP — app password required (not your account password).
        # TODO: move smtp_auth_password to a Kubernetes Secret before production.
        smtp_smarthost: 'smtp.gmail.com:587'
        smtp_from: 'dummysender111@gmail.com'
        smtp_auth_username: 'dummysender111@gmail.com'
        smtp_auth_password: ''
        smtp_require_tls: true

      route:
        # Default receiver for all alerts not matched by a sub-route below.
        receiver: email-notifications
        group_by: ['alertname', 'namespace']
        # Wait 30s after first alert before sending — collects related alerts together.
        group_wait: 30s
        # If new alerts arrive for an existing group, wait 5m before re-notifying.
        group_interval: 5m
        # If an alert is still firing, resend every 4h (not every 30s).
        repeat_interval: 4h
        routes:
          # Watchdog and InfoInhibitor are internal heartbeat/helper alerts.
          # Route them to null so they never reach your inbox.
          - receiver: 'null'
            matchers:
              - alertname =~ "InfoInhibitor|Watchdog"

      receivers:
        - name: 'null'
        - name: email-notifications
          email_configs:
            - to: 'shashankp@sanketika.in'
              send_resolved: true

      # Suppress lower-severity alerts when a higher-severity fires for the same thing.
      # Example: NodeHighCPUUsage (warning) won't fire if NodeNotReady (critical)
      # is already firing for the same namespace.
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity =~ warning|info
          equal: [namespace, alertname]
        - source_matchers:
            - severity = warning
          target_matchers:
            - severity = info
          equal: [namespace, alertname]

    alertmanagerSpec:
      # How long Alertmanager keeps fired alert history.
      # 168h = 7 days — keeping it consistent with Prometheus retention.
      retention: 168h

      # Alertmanager only stores alert history (not metrics), so 2Gi is plenty.
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi


# ── Not yet started ───────────────────────────────────────────────────────────
loki:
  enabled: false

promtail:
  enabled: false

jaeger:
  enabled: false

otelcollector:
  enabled: false
