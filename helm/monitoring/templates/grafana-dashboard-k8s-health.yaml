apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k8s-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  k8s-workload-health.json: |-
    {
      "__inputs": [],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.2.1"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "table", "name": "Table", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""},
        {"type": "panel", "id": "bargauge", "name": "Bar gauge", "version": ""}
      ],
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [{"type": "special", "options": {"match": "null", "result": {"text": "0", "color": "green"}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "unit": "none",
              "decimals": 0,
              "noValue": "0"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(kube_pod_container_status_ready{namespace=~\"$namespace\"} == bool 0)", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "Containers NOT Ready",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [{"type": "special", "options": {"match": "null", "result": {"text": "0", "color": "green"}}}],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]},
              "unit": "none",
              "decimals": 0,
              "noValue": "0"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(kube_pod_container_status_waiting_reason{namespace=~\"$namespace\", reason=\"CrashLoopBackOff\"} == bool 1)", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "CrashLoopBackOff Containers",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "orange", "value": 5}, {"color": "red", "value": 10}]},
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {"colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h]))", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "Restarts (Last 1h)",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "orange", "value": 5}, {"color": "red", "value": 20}]},
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {"colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[24h]))", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "Restarts (Last 24h)",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "none",
              "decimals": 0
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Namespace"}, "properties": [{"id": "custom.width", "value": 150}]},
              {"matcher": {"id": "byName", "options": "Deployment"}, "properties": [{"id": "custom.width", "value": 260}]},
              {"matcher": {"id": "byName", "options": "Desired"}, "properties": [{"id": "custom.align", "value": "center"}, {"id": "custom.width", "value": 80}]},
              {"matcher": {"id": "byName", "options": "Ready"}, "properties": [{"id": "custom.align", "value": "center"}, {"id": "custom.width", "value": 80}]},
              {
                "matcher": {"id": "byName", "options": "Health %"},
                "properties": [
                  {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                  {"id": "custom.align", "value": "center"},
                  {"id": "custom.width", "value": 90},
                  {"id": "unit", "value": "percentunit"},
                  {"id": "decimals", "value": 0},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1.0}]}}
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 4},
          "id": 5,
          "options": {"cellHeight": "sm", "footer": {"show": false}, "showHeader": true, "sortBy": [{"desc": false, "displayName": "Namespace"}]},
          "pluginVersion": "11.2.1",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum by(namespace, deployment) (kube_deployment_spec_replicas{namespace=~\"$namespace\"})", "format": "table", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum by(namespace, deployment) (kube_deployment_status_replicas_ready{namespace=~\"$namespace\"})", "format": "table", "instant": true, "legendFormat": "__auto", "range": false, "refId": "B"}
          ],
          "title": "Deployment Health — Ready vs Desired",
          "transformations": [
            {"id": "merge", "options": {}},
            {
              "id": "calculateField",
              "options": {
                "alias": "Health %",
                "mode": "binaryOperation",
                "binary": {"left": "Value #B", "operator": "/", "right": "Value #A"}
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {"Time": true},
                "renameByName": {"deployment": "Deployment", "namespace": "Namespace", "Value #A": "Desired", "Value #B": "Ready"}
              }
            }
          ],
          "type": "table"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "insertNulls": false, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 14},
          "id": 6,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "right", "showLegend": true}, "tooltip": {"mode": "multi", "sort": "desc"}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum by(pod)(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[10m]))", "instant": false, "legendFormat": "{{`{{pod}}`}}", "range": true, "refId": "A"}],
          "title": "Container Restart Trend (10m windows — spikes = crash loops)",
          "type": "timeseries"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {"align": "auto", "cellOptions": {"type": "auto"}, "inspect": false},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "none",
              "decimals": 0
            },
            "overrides": [
              {"matcher": {"id": "byName", "options": "Pod"}, "properties": [{"id": "custom.width", "value": 280}]},
              {"matcher": {"id": "byName", "options": "Container"}, "properties": [{"id": "custom.width", "value": 180}]},
              {"matcher": {"id": "byName", "options": "Namespace"}, "properties": [{"id": "custom.width", "value": 130}]},
              {
                "matcher": {"id": "byName", "options": "Restarts"},
                "properties": [
                  {"id": "custom.cellOptions", "value": {"type": "color-background", "mode": "basic"}},
                  {"id": "custom.align", "value": "center"},
                  {"id": "custom.width", "value": 90},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 3}, {"color": "orange", "value": 10}, {"color": "red", "value": 20}]}}
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 14, "x": 0, "y": 22},
          "id": 7,
          "options": {"cellHeight": "sm", "footer": {"show": false}, "showHeader": true, "sortBy": [{"desc": true, "displayName": "Restarts"}]},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "topk(20, kube_pod_container_status_restarts_total{namespace=~\"$namespace\"} > 0)", "format": "table", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "Container Restart Count — Top Crashers",
          "transformations": [
            {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "uid": true, "job": true, "endpoint": true, "instance": true, "service": true}, "renameByName": {"pod": "Pod", "container": "Container", "namespace": "Namespace", "Value": "Restarts"}}}
          ],
          "type": "table"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 1,
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 60}, {"color": "orange", "value": 80}, {"color": "red", "value": 90}]},
              "unit": "percent",
              "max": 100, "min": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 10, "x": 14, "y": 22},
          "id": 8,
          "options": {"displayMode": "gradient", "minVizHeight": 10, "minVizWidth": 0, "namePlacement": "auto", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true, "sizing": "auto", "valueMode": "color"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} / kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"} * 100", "instant": true, "legendFormat": "{{`{{persistentvolumeclaim}}`}} ({{`{{namespace}}`}})", "range": false, "refId": "A"}],
          "title": "PVC Disk Usage %",
          "type": "bargauge"
        }

      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["kubernetes", "workloads", "health"],
      "templating": {
        "list": [
          {
            "allValue": null,
            "current": {"selected": false, "text": "All", "value": "$__all"},
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "definition": "label_values(kube_pod_info{namespace=~\"aggregator|signals|common-services|monitoring\"}, namespace)",
            "hide": 0,
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": {
              "query": "label_values(kube_pod_info{namespace=~\"aggregator|signals|common-services|monitoring\"}, namespace)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Kubernetes Workload Health",
      "uid": "k8s-workload-health-001",
      "version": 1,
      "weekStart": ""
    }
