apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infra
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  infra-resources.json: |-
    {
      "__inputs": [],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.2.1"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""},
        {"type": "panel", "id": "table", "name": "Table", "version": ""}
      ],
      "annotations": {"list": [{"builtIn": 1, "datasource": {"type": "grafana", "uid": "-- Grafana --"}, "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "none", "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "count(kube_pod_status_phase{namespace=~\"$namespace\", phase=\"Running\"})", "instant": true, "legendFormat": "__auto", "range": false, "refId": "A"}],
          "title": "Running Pods — $namespace",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "none", "decimals": 2
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Current Usage"},
                "properties": [
                  {"id": "unit", "value": "cores"},
                  {"id": "decimals", "value": 3},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 2}, {"color": "orange", "value": 4}, {"color": "red", "value": 8}]}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Cluster %"},
                "properties": [
                  {"id": "unit", "value": "percent"},
                  {"id": "decimals", "value": 1},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 60}, {"color": "orange", "value": 80}, {"color": "red", "value": 90}]}}
                ]
              }
            ]
          },
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "auto", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "pluginVersion": "11.2.1",
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", pod=~\"$pod\", container!=\"\", container!=\"POD\"}[5m]))", "instant": true, "legendFormat": "Current Usage", "range": false, "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100", "instant": true, "legendFormat": "Cluster %", "range": false, "refId": "B"}
          ],
          "title": "CPU",
          "type": "stat"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "none", "decimals": 1
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Current Usage"},
                "properties": [
                  {"id": "unit", "value": "bytes"},
                  {"id": "decimals", "value": 1},
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1073741824}, {"color": "orange", "value": 2147483648}, {"color": "red", "value": 4294967296}]}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Cluster %"},
                "properties": [
                  {"id": "unit", "value": "percent"},
                  {"id": "decimals", "value": 1},
