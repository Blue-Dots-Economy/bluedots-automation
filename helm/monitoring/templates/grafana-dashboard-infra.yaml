          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum by(pod)(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", pod=~\"$pod\", container!=\"\", container!=\"POD\"}[5m]))", "instant": false, "legendFormat": "{{`{{pod}}`}}", "range": true, "refId": "A"}],
          "title": "CPU Usage per Pod",
          "type": "timeseries"
        },

        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
