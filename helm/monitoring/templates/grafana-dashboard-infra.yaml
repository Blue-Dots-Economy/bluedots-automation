          "targets": [{"datasource": {"type": "prometheus", "uid": "prometheus"}, "editorMode": "code", "expr": "sum by(pod)(container_memory_working_set_bytes{namespace=~\"$namespace\", pod=~\"$pod\", container!=\"\", container!=\"POD\"})", "instant": false, "legendFormat": "{{`{{pod}}`}}", "range": true, "refId": "A"}],
          "title": "Memory Usage per Pod",
