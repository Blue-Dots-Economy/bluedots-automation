apiVersion: v2
name: dpg
description: Umbrella chart for DPG monorepo (api, ui, notification-service, match-score, postgresql, redis) with centralized image/resource/credential values.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - dpg
  - umbrella
maintainers:
  - name: Sanketika
sources:
  - https://github.com/Sanketika-Obsrv/dpg-monorepo
dependencies:
  - name: dpg-api
    version: 0.1.0
    repository: "file://../api"
    alias: api
  - name: dpg-ui
    version: 0.1.0
    repository: "file://../ui"
    alias: ui
  - name: dpg-notification-service
    version: 0.1.0
    repository: "file://../notification-service"
    alias: notification-service
    condition: notification-service.enabled
  - name: dpg-match-score
    version: 0.1.0
    repository: "file://../match-score"
    alias: match-score
    condition: match-score.enabled
  - name: postgresql
    version: 18.6.6
    repository: "file://../postgresql"
    condition: postgresql.enabled
  - name: redis
    version: 19.6.4
    repository: "file://../redis"
    condition: redis.enabled
