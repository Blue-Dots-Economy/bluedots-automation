{{- /*
Optional Docker registry Secret for pulling private images (e.g. GHCR).
DISABLED by default — PAT/password in values.yaml is risky to commit.

Recommended: keep `create: false` and pre-create the Secret manually:

  kubectl -n <release-ns> create secret docker-registry ghcr-pull \
    --docker-server=ghcr.io \
    --docker-username=<GHCR_USER> \
    --docker-password=<GHCR_PAT>

For CI / one-shot installs, enable here and pass the PAT inline:

  helm upgrade --install dpg . \
    --set imagePullSecret.create=true \
    --set imagePullSecret.username=$GHCR_USER \
    --set imagePullSecret.password=$GHCR_PAT

`imagePullSecrets` (at top of values.yaml, consumed by api/ui pods) references
the same Secret name. Keep both aligned.
*/}}
{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{%q:{\"username\":%q,\"password\":%q,\"email\":%q,\"auth\":%q}}}"
        .Values.imagePullSecret.registry
        .Values.imagePullSecret.username
        .Values.imagePullSecret.password
        .Values.imagePullSecret.email
        (printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.password | b64enc)
      | b64enc }}
{{- end }}
