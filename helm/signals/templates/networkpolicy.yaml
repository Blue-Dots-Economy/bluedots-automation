{{- if .Values.networkPolicy.enabled }}
{{- /*
  Ingress-only baseline NetworkPolicy for the signals namespace (#1.12).
  Ingress-only on purpose: egress is left unrestricted so app pods keep reaching
  the shared Postgres/Redis in common-services, DNS, and the embeddings service
  without a second policy to maintain. When enabled, only the listed namespaces
  (+ same namespace) may open connections TO signals pods.

  DEFAULT OFF. Validate `allowedFromNamespaces` against your topology before
  enabling — e.g. aggregator-dpg calls the signals API (signalstack), so the
  `aggregator` namespace must stay listed or that integration breaks. Namespaces
  are matched on the built-in `kubernetes.io/metadata.name` label.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-ingress
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: dpg
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
{{- range .Values.networkPolicy.allowedFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
{{- end }}
