{{- /*
Render Secrets that subcharts consume by name:
  - dpg-postgres      (bitnami postgres existingSecret)
  - dpg-redis         (bitnami redis existingSecret)
Passwords come from .Values.credentials.* — populated by install.sh.
If a password is empty the Secret is skipped so `helm template`/`lint`
stay clean before install.sh runs.

NOTE: The api Secret (dpg-api) is rendered by the api subchart's
templates/secret.yaml using credentials.api.data. The previously-rendered
`dpg-api-secrets` here was a dead duplicate — removed.
*/}}
{{- with .Values.credentials.postgresql }}
{{- if .password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .existingSecret }}
  labels:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
type: Opaque
stringData:
  {{ .adminPasswordKey }}: {{ .password | quote }}
  {{ .userPasswordKey }}: {{ .password | quote }}
{{- end }}
{{- end }}
---
{{- with .Values.credentials.redis }}
{{- if .password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .existingSecret }}
  labels:
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
type: Opaque
stringData:
  {{ .passwordKey }}: {{ .password | quote }}
{{- end }}
{{- end }}
