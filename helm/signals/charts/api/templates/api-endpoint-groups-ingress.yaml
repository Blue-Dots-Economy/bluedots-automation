{{- if and .Values.ingress.enabled .Values.apiRateLimit.enabled .Values.apiRateLimit.groups }}
{{- /*
  Per-API rate limiting for signals-api (path base /api, strip-path FALSE — the
  api serves natively under /api, so each group path forwards as-is).

  Each `apiRateLimit.groups` entry → its own Kong route with a per-IP rate-limit
  plugin and its OWN counter. Paths that share the same effective limit
  (entry.limit, or apiRateLimit.defaultMinute) are grouped into ONE KongPlugin +
  ONE Ingress, so the object count tracks the number of DISTINCT limits, not the
  number of APIs. These routes are more specific than the /api catch-all
  (templates/ingress.yaml), so Kong matches them first; anything not listed falls
  through to the per-service catch-all limit.

  policy: redis + limit_by: ip + the {vault://env/redis-password} reference mirror
  the cluster rate-limit tiers (common-services/templates/kong-ratelimit.yaml);
  Kong resolves the vault reference from its own pod env, so the plaintext never
  lands on these namespaced KongPlugin CRs.
*/ -}}
{{- $fullName := include "dpg-api.fullname" . -}}
{{- $hosts := .Values.global.publicHosts | default (list (required "global.publicHost is required" .Values.global.publicHost)) -}}
{{- /* single source: global.apiRateLimit.defaultMinute (global-values.yaml), fallback to the chart default */ -}}
{{- $default := dig "apiRateLimit" "defaultMinute" .Values.apiRateLimit.defaultMinute (.Values.global | default dict) -}}
{{- $redis := .Values.apiRateLimit.redis -}}
{{- /* group the configured paths by their effective per-IP limit */ -}}
{{- $byLimit := dict -}}
{{- range .Values.apiRateLimit.groups }}
  {{- $n := .limit | default $default -}}
  {{- $k := printf "%v" $n -}}
  {{- $cur := index $byLimit $k | default (list) -}}
  {{- $_ := set $byLimit $k (append $cur .path) -}}
{{- end }}
{{- range $limit, $paths := $byLimit }}
{{- /* Default-limit group gets a STABLE name (no value suffix) so it never churns
       when the limit is retuned; override groups keep -<value> so distinct limits
       don't collide. The real limit is config.minute, not the name. */ -}}
{{- $suffix := ternary "" (printf "-%v" $limit) (eq (int $limit) (int $default)) -}}
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ $fullName }}-rl{{ $suffix }}
  labels:
    {{- include "dpg-api.labels" $ | nindent 4 }}
plugin: rate-limiting
config:
  minute: {{ $limit | int }}
  policy: redis
  limit_by: ip
  fault_tolerant: true
  redis:
    host: {{ $redis.host | quote }}
    port: {{ $redis.port }}
    password: "{vault://env/redis-password}"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-endpoints{{ $suffix }}
  labels:
    {{- include "dpg-api.labels" $ | nindent 4 }}
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: {{ printf "%s-rl%s" $fullName $suffix | quote }}
spec:
  {{- with $.Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          {{- range $paths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
