{{- if .Values.ingress.enabled -}}
{{- /*
  Template-driven ingress for the signals API. The routing STRUCTURE is fixed
  here — path /api, strip-path "false" (signals-api serves natively under /api).
  Hosts come from global.publicHosts (defaulting to the single global.publicHost
  — the SAME list the ui ingress uses), so every host that serves the UI also
  serves /api: each per-domain portal is fully same-origin (host/ + host/api),
  no CORS. Other scalars from ingress.* (className / tlsSecret / plugin).

  No cert-manager annotation: the ui subchart owns issuance of the shared host
  cert (ingress.tlsSecret); this object only references it, avoiding a duplicate
  certificate for the same host.
*/ -}}
{{- $fullName := include "dpg-api.fullname" . -}}
{{- $hosts := .Values.global.publicHosts | default (list (required "global.publicHost is required" .Values.global.publicHost)) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "dpg-api.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "false"
    {{- if .Values.ingress.plugin }}
    konghq.com/plugins: {{ .Values.ingress.plugin | quote }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tlsSecret }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
