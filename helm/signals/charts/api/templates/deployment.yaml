apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dpg-api.fullname" . }}
  labels:
    {{- include "dpg-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dpg-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        # Rolls the api when network schemas or consent.json change (consent is
        # cached in-process, so a restart is required to pick up ConfigMap edits).
        checksum/schemas: {{ include (print $.Template.BasePath "/schemas-configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "dpg-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dpg-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dpg-api.fullname" . }}
            - secretRef:
                name: {{ include "dpg-api.secretName" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.schemas.networks }}
          volumeMounts:
            - name: schemas
              mountPath: /app/schemas
              readOnly: true
          {{- end }}
      {{- if .Values.schemas.networks }}
      volumes:
        - name: schemas
          configMap:
            name: {{ include "dpg-api.fullname" . }}-schemas
            # Explicit items so the optional brand consent lands in a subdir
            # (/app/schemas/<brand>/consent.json); ConfigMap keys can't contain
            # "/", so the key is mapped to a nested path here.
            items:
            {{- range .Values.schemas.networks }}
              - key: {{ . }}.json
                path: {{ . }}.json
            {{- end }}
            {{- if .Values.schemas.consentNetwork }}
              - key: consent.json
                path: consent.json
              {{- if .Values.schemas.consentBrand }}
              - key: {{ .Values.schemas.consentBrand }}-consent.json
                path: {{ .Values.schemas.consentBrand }}/consent.json
              {{- end }}
            {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
