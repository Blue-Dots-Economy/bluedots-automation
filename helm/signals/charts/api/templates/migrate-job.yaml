{{- if .Values.migrate.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dpg-api.fullname" . }}-migrate-sql
  labels:
    {{- include "dpg-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  # Only service-user provisioning SQL is vendored; schema DDL ships in the api image.
  provision_service_users.sql: |
{{ .Files.Get "files/provision_service_users.sql" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dpg-api.fullname" . }}-migrate
  labels:
    {{- include "dpg-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit | default 3 }}
  ttlSecondsAfterFinished: {{ .Values.migrate.ttlSecondsAfterFinished | default 300 }}
  template:
    metadata:
      labels:
        {{- include "dpg-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "dpg-api.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # Applies the schema from the api image (migrate.mjs over one Drizzle ledger),
        # same image+tag as the api Deployment → deployed schema matches the build.
        - name: migrate-ddl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["node", "apps/api/scripts/migrate.mjs"]
          envFrom:
            - configMapRef:
                name: {{ include "dpg-api.fullname" . }}
            - secretRef:
                name: {{ include "dpg-api.secretName" . }}
      containers:
        # Upserts the aggregator-dpg service org/user/apikey after migrate-ddl; idempotent.
        - name: provision
          image: {{ .Values.migrate.image | default "postgres:16-alpine" }}
          imagePullPolicy: {{ .Values.migrate.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "dpg-api.fullname" . }}
            - secretRef:
                name: {{ include "dpg-api.secretName" . }}
          command:
            - sh
            - -ec
            - |
              : "${POSTGRES_HOST:?missing}" "${POSTGRES_PORT:=5432}" "${POSTGRES_USER:?missing}" "${POSTGRES_PASSWORD:?missing}" "${POSTGRES_DB:?missing}"
              echo "waiting for postgres at $POSTGRES_HOST:$POSTGRES_PORT"
              i=0
              until PGPASSWORD="$POSTGRES_PASSWORD" pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -gt 60 ]; then echo "postgres not reachable" >&2; exit 1; fi
                sleep 2
              done
              echo "postgres ready"
              : "${AGGREGATOR_DPG_API_KEY:?missing — set via the api Secret}"
              echo "provisioning service apikeys"
              PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 \
                -v aggregator_dpg_api_key="$AGGREGATOR_DPG_API_KEY" \
                -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                -f /sql/provision_service_users.sql
              echo "service apikeys provisioned"
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            {{- toYaml (.Values.migrate.resources | default dict) | nindent 12 }}
      volumes:
        - name: sql
          configMap:
            name: {{ include "dpg-api.fullname" . }}-migrate-sql
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
