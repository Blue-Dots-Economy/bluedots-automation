# Default values for dpg-s3-export — the Signals non-PII S3 export CronJob.
#
# Code + image: Blue-Dots-Economy/adhoc-scripts → signals-s3-export/.
# The export manifest under files/manifests/<network>.json is a COPY of the
# reviewed contract in adhoc-scripts (source of truth). Sync it when that
# repo's manifest changes — every run records the manifest sha256 in its S3
# run manifest, so drift is detectable.

image:
  repository: ghcr.io/blue-dots-economy/adhoc-scripts/signals-s3-export
  tag: "main"        # pin to a semver/sha tag per environment overlay
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  name: ""
  # EKS/IRSA: role limited to s3:PutObject on the export prefix.
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/signals-s3-export
  annotations: {}

# ── destination ──────────────────────────────────────────────────────────────
s3:
  bucket: signals-export
  prefix: ""             # empty = keys start at <network>/<instance_id>/
  endpointUrl: ""        # empty = real AWS; set for MinIO (e.g. http://minio:9000)
  region: "ap-south-1"
  forcePathStyle: false
  # Static credentials ONLY for non-IRSA setups (MinIO/dev): name of an
  # existing Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY keys.
  existingCredentialsSecret: ""

# ── export behaviour (instance-agnostic) ─────────────────────────────────────
export:
  # 'aggregator_onboarded' (default) or 'all' (explicit opt-in to everything).
  scope: aggregator_onboarded

# ── instances — one CronJob + env ConfigMap (+ optional DB Secret) each ─────
# Each Signals instance (own database) exports separately. If two instances
# still share one database, deploy only one entry (two would double-export).
instances: []
#  - id: blue_dot_up
#    network: blue_dot
#    schedule: "0 0,12 * * *"        # in cronJob.timeZone
#    suspend: false
#    # EITHER reference a pre-created Secret holding DATABASE_URL (preferred)…
#    existingDatabaseSecret: ""
#    # …OR let the chart render one (pass via --set, never commit):
#    databaseUrl: ""

# Networks whose export manifest ConfigMaps to render, from
# files/manifests/<network>.json. Shared across instances of that network.
networks:
  - blue_dot

cronJob:
  timeZone: Asia/Kolkata     # k8s >= 1.27
  concurrencyPolicy: Forbid  # a slow run must not overlap the next slot
  startingDeadlineSeconds: 900
  backoffLimit: 2            # retries safe: runs idempotent per run folder
  activeDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # job writes NDJSON parts to its work emptyDir
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
