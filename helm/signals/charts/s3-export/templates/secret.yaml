{{- /*
Chart-managed DB Secret per instance, only when databaseUrl is set (pass via
--set at install time — never commit). Preferred alternative: pre-create the
Secret and reference it via existingDatabaseSecret. The URL must use the
dedicated READ-ONLY role (see the exporter README), never the app user.
*/ -}}
{{- range .Values.instances }}
{{- if and .databaseUrl (not .existingDatabaseSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dpg-s3-export.fullname" $ }}-db-{{ include "dpg-s3-export.instanceSlug" .id }}
  labels:
    {{- include "dpg-s3-export.labels" $ | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .databaseUrl | quote }}
{{- end }}
{{- end }}
