{{- $pdb := dict }}
{{- with .Values.global }}{{- with .signals }}{{- with .ui }}
  {{- if .podDisruptionBudget }}{{- $pdb = .podDisruptionBudget }}{{- end }}
{{- end }}{{- end }}{{- end }}
{{- if not $pdb }}{{- $pdb = .Values.podDisruptionBudget }}{{- end }}
{{- if $pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dpg-ui.fullname" . }}
  labels:
    {{- include "dpg-ui.labels" . | nindent 4 }}
spec:
  minAvailable: {{ $pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "dpg-ui.selectorLabels" . | nindent 6 }}
{{- end }}
