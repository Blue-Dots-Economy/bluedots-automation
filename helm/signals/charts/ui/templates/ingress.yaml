{{- if .Values.ingress.enabled -}}
{{- /*
  Template-driven ingress for the signals UI. The routing STRUCTURE is fixed
  here — path / (catch-all). Host comes from global.publicHost; other scalars
  from ingress.* (className / tlsSecret / clusterIssuer / plugin).

  This object owns the cert-manager issuance for the shared host cert
  (ingress.tlsSecret); the api subchart reuses the same secret.
*/ -}}
{{- $fullName := include "dpg-ui.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "dpg-ui.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- if .Values.ingress.plugin }}
    konghq.com/plugins: {{ .Values.ingress.plugin | quote }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.global.publicHost }}
      secretName: {{ .Values.ingress.tlsSecret }}
  {{- end }}
  rules:
    - host: {{ required "global.publicHost is required" .Values.global.publicHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
