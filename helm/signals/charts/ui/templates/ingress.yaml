{{- if .Values.ingress.enabled -}}
{{- /*
  Template-driven ingress for the signals UI. The routing STRUCTURE is fixed
  here — path / (catch-all). Hosts come from global.publicHosts (defaulting to
  the single global.publicHost); other scalars from ingress.* (className /
  tlsSecret / clusterIssuer / plugin).

  global.publicHosts is the ONE place the served hostnames are set; the api
  subchart's ingress reads the same list so every host that serves the UI also
  serves /api (same-origin per portal). Multiple hosts let one UI instance back
  several per-domain portals (e.g. provider + seeker); the image then picks
  VITE_SERVED_BINDINGS per request from the Host header (ui.hostBindings). All
  hosts share one multi-SAN cert.

  This object owns the cert-manager issuance for the shared host cert
  (ingress.tlsSecret); the api subchart reuses the same secret.
*/ -}}
{{- $fullName := include "dpg-ui.fullname" . -}}
{{- $hosts := .Values.global.publicHosts | default (list (required "global.publicHost is required" .Values.global.publicHost)) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "dpg-ui.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- if .Values.ingress.plugin }}
    konghq.com/plugins: {{ .Values.ingress.plugin | quote }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tlsSecret }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .Values.ingress.tlsSecret }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
