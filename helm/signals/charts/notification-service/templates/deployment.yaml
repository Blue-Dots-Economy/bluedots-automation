apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dpg-notification-service.fullname" . }}
  labels:
    {{- include "dpg-notification-service.labels" . | nindent 4 }}
spec:
  {{- $autoscaling := dict }}
  {{- $replicaCount := 0 }}
  {{- with .Values.global }}{{- with .signals }}{{- with .notificationService }}
    {{- if .autoscaling }}{{- $autoscaling = .autoscaling }}{{- end }}
    {{- if .replicaCount }}{{- $replicaCount = .replicaCount }}{{- end }}
  {{- end }}{{- end }}{{- end }}
  {{- if not $autoscaling }}{{- $autoscaling = .Values.autoscaling }}{{- end }}
  {{- if not $replicaCount }}{{- $replicaCount = .Values.replicaCount }}{{- end }}
  {{- if not $autoscaling.enabled }}
  replicas: {{ $replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dpg-notification-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.internalSecrets.create }}
        checksum/internal-secret: {{ include (print $.Template.BasePath "/internal-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "dpg-notification-service.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dpg-notification-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: notification-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dpg-notification-service.fullname" . }}
            - secretRef:
                name: {{ include "dpg-notification-service.secretName" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: internal-secrets
              mountPath: {{ .Values.internalSecrets.mountPath }}
              readOnly: true
      volumes:
        - name: internal-secrets
          secret:
            secretName: {{ include "dpg-notification-service.internalSecretsName" . }}
            items:
              - key: {{ .Values.internalSecrets.fileName }}
                path: {{ .Values.internalSecrets.fileName }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
