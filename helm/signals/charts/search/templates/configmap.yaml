apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "search.fullname" . }}
  labels: {{- include "search.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  {{- /* Default the embedding/rerank host to the TEI service of THIS release
        ({release}-search-embeddings) so it's correct regardless of release name;
        override via embedding.baseUrl/rerankBaseUrl only for an external endpoint. */}}
  EMBEDDING_BASE_URL: {{ .Values.embedding.baseUrl | default (printf "http://%s-search-embeddings:80/v1" .Release.Name) | quote }}
  RERANK_BASE_URL: {{ .Values.embedding.rerankBaseUrl | default (printf "http://%s-search-embeddings:8081" .Release.Name) | quote }}
  EMBEDDING_MODEL: {{ .Values.embedding.model | quote }}
  EMBEDDING_DIM: {{ .Values.embedding.dim | quote }}
  NETWORK_CONFIG_PATH: {{ .Values.networkConfigPath | quote }}
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
