apiVersion: v1
kind: Service
metadata:
  name: {{ include "search.fullname" . }}
  labels: {{- include "search.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "search.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
