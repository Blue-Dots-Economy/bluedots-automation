# One image serves both the worker and the API; the deployments pick the
# entrypoint via `command` (node dist/worker/main.js | node dist/api/main.js).
image:
  repository: ghcr.io/blue-dots-economy/signals-search
  tag: "sha-48a3c65"
  pullPolicy: Always
imagePullSecrets:
  - name: ghcr-pull
worker:
  replicaCount: 1
  resources: { requests: { cpu: 100m, memory: 384Mi }, limits: { cpu: 1, memory: 1Gi } }
api:
  replicaCount: 1
  port: 3100
  resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 1, memory: 512Mi } }
  ingress:
    enabled: false
serviceAccount:
  create: true

# Per-API rate limiting (templates/api-endpoint-groups-ingress.yaml). signals-search
# strips /signals-search (serves at root), so routes use a regex path + rewrite to
# strip only that prefix. The single search endpoint gets its own per-IP counter.
# Renders only while api.ingress.enabled + api.ingress.className (kong) are set.
apiRateLimit:
  enabled: true
  defaultMinute: 600   # uniform per-IP requests/min (the one knob; ~10 req/s)
  redis:               # shared common-services Redis Kong uses for counters
    host: common-services-redis-master.common-services.svc.cluster.local
    port: 6379
  groups:
    - { path: v1/search }
postgres:
  host: up-blue-dots-prod-postgres.cbo8sc80w9ld.ap-south-1.rds.amazonaws.com
  port: 5432
redis:
  host: common-services-redis-master.common-services.svc.cluster.local
  port: 6379
embedding:
  # Host defaults to {release}-search-embeddings (the in-cluster TEI service of
  # this release; see configmap.yaml). Set baseUrl/rerankBaseUrl only to point at
  # an external embedding/rerank endpoint.
  baseUrl: ""
  rerankBaseUrl: ""
  model: "BAAI/bge-m3"
  dim: "1024"
# Search reuses the api subchart's network-schema ConfigMap (single source of
# network configs — no duplication) mounted at networkConfigPath; the registry
# loads every *.json in it, so search indexes exactly the networks the api
# serves (api.schemas.networks). Defaults to "{release}-api-schemas"; override
# only if the api ConfigMap is named differently.
networkConfigPath: /app/schemas
networkSchemasConfigMap: ""
config:
  # RUN_MIGRATIONS off: Signals-DPG owns the item_search DDL (applied by the api
  # migrate-job). The worker fails fast if the table is absent.
  RUN_MIGRATIONS: "false"
  INGEST_STREAM: "signals:item-events"
  INGEST_CONSUMER_GROUP: "signals-search"
  SWEEP_INTERVAL_MS: "60000"
  SWEEP_BATCH_SIZE: "200"
secrets:
  create: true
  existingSecret: dpg-search-secrets
  data:
    POSTGRES_USER: "dpg"
    POSTGRES_DB: "dpg"
    POSTGRES_PASSWORD: ""
    REDIS_PASSWORD: ""
    EMBEDDING_API_KEY: ""
