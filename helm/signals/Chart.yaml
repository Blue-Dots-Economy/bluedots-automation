apiVersion: v2
name: dpg
description: Umbrella chart for DPG monorepo (api, ui, notification-service, match-score) with centralized image/resource/credential values. Postgres + Redis are provided by the shared common-services release.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - dpg
  - umbrella
maintainers:
  - name: Sanketika
sources:
  - https://github.com/Sanketika-Obsrv/dpg-monorepo
dependencies:
  - name: dpg-api
    version: 0.1.0
    repository: "file://../api"
    alias: api
  - name: dpg-ui
    version: 0.1.0
    repository: "file://../ui"
    alias: ui
  - name: dpg-notification-service
    version: 0.1.0
    repository: "file://../notification-service"
    alias: notification-service
    condition: notification-service.enabled
  - name: dpg-match-score
    version: 0.1.0
    repository: "file://../match-score"
    alias: match-score
    condition: match-score.enabled
  - name: dpg-search
    version: 0.1.0
    repository: "file://../search"
    alias: search
    condition: search.enabled
  - name: dpg-search-embeddings
    version: 0.1.0
    repository: "file://../search-embeddings"
    alias: search-embeddings
    condition: search-embeddings.enabled
  - name: dpg-s3-export
    version: 0.1.0
    repository: "file://../s3-export"
    alias: s3-export
    condition: s3-export.enabled
