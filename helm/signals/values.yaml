# =============================================================================
# DPG umbrella chart — centralized values
# Edit ONLY the three sections below (images, resources, credentials).
# Per-subchart blocks at the bottom alias these via YAML anchors.
# =============================================================================

# -----------------------------------------------------------------------------
# Global — values Helm propagates to every subchart's .Values.global.
# -----------------------------------------------------------------------------
global:
  # Public FQDN shared by /api (signals-api) and / (signals-ui). The api/ui
  # ingress templates read this. UPDATE per environment via the overlay.
  publicHost: dpg.example.com
  # publicHosts: all hostnames this release serves (the ONE place to list them).
  # Empty -> [publicHost] (single host, unchanged). Both the ui and api ingress
  # read this, so every host serving the UI also serves /api (same-origin per
  # portal). Set this + ui.hostBindings for single-instance multi-domain:
  # publicHosts:
  #   - bluedotssignals.provider.org
  #   - bluedotssignals.seeker.org
  publicHosts: []

