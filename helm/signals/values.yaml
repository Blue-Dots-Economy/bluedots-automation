# Pull secrets shared by api/ui.
# Source: either pre-created Secret OR rendered via templates/ghcr-pull-secret.yaml
# (toggle via `imagePullSecret.create=true` below).
imagePullSecrets: &image_pull_secrets
  - name: ghcr-pull

# ─── Image pull Secret (optional, renders templates/ghcr-pull-secret.yaml) ──
# Default: pre-create the Secret out-of-band; chart only references it.
# Set create=true + supply username/password to let helm manage it instead.
# DO NOT commit a real PAT here — pass via --set at install time.
imagePullSecret:
  create: false
  name: ghcr-pull
  registry: ghcr.io
  username: ''
  password: ''   # GHCR PAT with read:packages scope
  email: ''

# -----------------------------------------------------------------------------
# Resources — single source for all 4 components
# -----------------------------------------------------------------------------
resources:
  api: &api_resources {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi
  ui: &ui_resources {}
  notificationService: &notification_service_resources {}
  matchScore: &match_score_resources {}
    # limits:
