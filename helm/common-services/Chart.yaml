apiVersion: v2
name: platform
description: Shared common-services stack — ingress-nginx + cert-manager + Let's Encrypt ClusterIssuer + shared Postgres & Redis. Install once per cluster; aggregator-dpg and signal-stack (dpg) consume via Ingress + cross-namespace DB FQDN.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.24.0-0"
keywords:
  - ingress-nginx
  - cert-manager
  - postgres
  - redis
  - common-services
maintainers:
  - name: sanketika
    email: ops@sanketika.in

dependencies:
  - name: ingress-nginx
    version: 4.15.1
    repository: file://charts/ingress-nginx
    condition: ingress-nginx.enabled

  - name: cert-manager
    version: v1.20.2
    repository: file://charts/cert-manager
    condition: cert-manager.enabled

  - name: postgresql
    version: 18.6.6
    repository: file://charts/postgresql
    condition: postgresql.enabled

  - name: redis
    version: 19.6.4
    repository: file://charts/redis
    condition: redis.enabled
