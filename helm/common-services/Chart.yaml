apiVersion: v2
name: platform
description: Shared platform stack — ingress-nginx + cert-manager + Let's Encrypt ClusterIssuer. Install once per cluster; aggregator-dpg and signal-stack (dpg) consume via Ingress resources.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.24.0-0"
keywords:
  - ingress-nginx
  - cert-manager
  - platform
maintainers:
  - name: sanketika
    email: ops@sanketika.in

dependencies:
  - name: ingress-nginx
    version: 4.15.1
    repository: file://charts/ingress-nginx
    condition: ingress-nginx.enabled

  - name: cert-manager
    version: v1.20.2
    repository: file://charts/cert-manager
    condition: cert-manager.enabled
