{{- if and (index .Values "cert-manager" "enabled") .Values.issuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuer.name }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
spec:
  acme:
    server: {{ .Values.issuer.server | quote }}
    email: {{ .Values.issuer.acmeEmail | quote }}
    privateKeySecretRef:
      name: {{ .Values.issuer.name }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.issuer.ingressClass }}
{{- end }}
