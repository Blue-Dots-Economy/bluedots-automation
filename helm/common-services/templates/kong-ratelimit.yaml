{{- /*
Rate-limit tiers → one KongClusterPlugin each (cluster-scoped, referenced by
any Ingress in any namespace via  konghq.com/plugins: <tier>).

policy: redis  → counters live in the shared common-services Redis, so the
configured limit stays correct regardless of how many Kong proxy replicas run.
limit_by: ip   → key on the client IP. Kong takes it from the PROXY-protocol
header the L4 ELB prepends (kong.env real_ip_header: proxy_protocol + trusted_ips
scoped to the VPC), NOT from a client-settable X-Forwarded-For header — which is
what makes limit_by: ip unspoofable behind the load balancer.
fault_tolerant → if Redis is briefly unreachable, fail OPEN (serve traffic)
rather than reject every request.

Pinned Kong Gateway 3.9 uses the nested `config.redis` block (not flat
`redis_host`/`redis_port`). The Redis password is NOT rendered here: it is a
Kong `env` vault reference ({vault://env/redis-password}) resolved at runtime
from the REDIS_PASSWORD env var (kong.customEnv → data-redis Secret), so the
plaintext never lands on these cluster-scoped CRs.
*/ -}}
{{- if and .Values.kong.enabled .Values.kong.rateLimitTiers }}
{{- $redis := .Values.kong.redis }}
{{- range $name, $cfg := .Values.kong.rateLimitTiers }}
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: {{ $name }}
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    {{- include "platform.labels" $ | nindent 4 }}
plugin: rate-limiting
config:
  minute: {{ required (printf "rateLimitTiers.%s needs a `minute` value" $name) $cfg.minute }}
  policy: redis
  limit_by: ip
  fault_tolerant: true
  redis:
    host: {{ $redis.host | quote }}
    port: {{ $redis.port }}
    # Resolved at runtime by Kong's `env` vault from the REDIS_PASSWORD env var
    # (kong.customEnv → data-redis Secret). The CR stores only this reference,
    # never the plaintext password.
    password: "{vault://env/redis-password}"
---
{{- end }}
{{- end }}
