{{- /*
Render the two Secrets the Bitnami subcharts consume by name:
  data-postgres  — keys: postgres-password, aggregator-password, dpg-password
  data-redis     — key:  redis-password
Passwords come from .Values.credentials.* (populated by Makefile platform-install).
Skipped at template/lint time if a password is blank.
*/}}
{{- if .Values.credentials.postgresAdminPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: data-postgres
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: common-services
type: Opaque
stringData:
  postgres-password: {{ .Values.credentials.postgresAdminPassword | quote }}
  aggregator-password: {{ .Values.credentials.aggregatorPassword | quote }}
  dpg-password: {{ .Values.credentials.dpgPassword | quote }}
{{- end }}
---
{{- if .Values.credentials.redisPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: data-redis
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: common-services
type: Opaque
stringData:
  redis-password: {{ .Values.credentials.redisPassword | quote }}
{{- end }}
