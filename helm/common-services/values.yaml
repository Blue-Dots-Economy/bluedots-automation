# =============================================================================
# Platform umbrella chart — shared ingress-nginx + cert-manager.
# Install ONCE per cluster, before aggregator-dpg or signal-stack.
# =============================================================================

# ─── ClusterIssuer (consumed by Ingress objects in other namespaces) ─────────
issuer:
  enabled: true
  # Name referenced by `cert-manager.io/cluster-issuer` annotation on Ingress.
  name: letsencrypt-prod
  # ACME registration email for Let's Encrypt.
  acmeEmail: ops@sanketika.in
  # ACME server. Use the staging URL while debugging to avoid rate limits:
  #   https://acme-staging-v02.api.letsencrypt.org/directory
  server: https://acme-v02.api.letsencrypt.org/directory
  # Ingress class used by the cert-manager HTTP-01 solver. Now Kong (the sole
  # controller); solver Ingresses are created with class "kong".
  ingressClass: kong

# ─── ingress-nginx subchart values (consumed verbatim) ───────────────────────
# See: https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
# RETIRED (Phase 5): Kong is now the sole ingress controller. Disabling removes
# the nginx controller + its LoadBalancer. All Ingress objects (signals,
# aggregator) and the cert-manager issuer have been migrated to class "kong".
ingress-nginx:
  enabled: false
  controller:
    # IngressClass + controller selector. Single controller per cluster keeps
    # routing simple; multiple controllers need distinct classes.
    ingressClassResource:
      name: nginx
      enabled: true
      default: true
    ingressClass: nginx
    # Watch Ingress resources cluster-wide so cross-ns Ingress works.
    scope:
      enabled: false
    service:
      type: LoadBalancer
      # Cloud LB annotations go here if you need NLB / static IP / etc.
      annotations: {}
    config:
      use-forwarded-headers: "true"
      proxy-body-size: "10m"
    # Tune resources for prod traffic.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ─── Kong Ingress Controller (DB-less) ───────────────────────────────────────
# Vendored chart 3.2.0 (Kong Gateway 3.9 → rate-limiting uses nested config.redis).
# PHASE 1: deploy ALONGSIDE ingress-nginx — Kong is NOT the default IngressClass
# yet, so no existing Ingress routes through it until its className is flipped
# (Phases 3-4). cert-manager issuer + nginx default stay as-is until Phase 5.
# Values under `kong:` are passed verbatim to the kong subchart.
kong:
  enabled: true

  # DB-less mode + parity with the proxy tuning ingress-nginx does today.
  # (deep-merged onto the subchart's env defaults — database:"off" etc.)
  env:
    database: "off"
    nginx_http_client_max_body_size: "1024m"   # was nginx proxy-body-size: 1024m
    # Large upstream-response header buffer (was nginx proxy-buffer-size: 32k).
    # nginx requires proxy_busy_buffers_size <= (total proxy_buffers - one buffer),
    # so the three directives must be set together — bumping proxy_buffer_size
    # alone fails nginx config validation and crash-loops the proxy.
    nginx_proxy_proxy_buffer_size: "32k"
    nginx_proxy_proxy_buffers: "4 32k"          # 4 x 32k = 128k total
    nginx_proxy_proxy_busy_buffers_size: "64k"  # <= 128k - 32k = 96k  ✓
    # Honor X-Forwarded-For from the AWS LB so rate limiting (Phase 2) keys on
    # the real client IP, not the load balancer's address.
    trusted_ips: "0.0.0.0/0,::/0"
    real_ip_header: "X-Forwarded-For"

  ingressController:
    enabled: true
    ingressClass: kong
    createIngressClass: true
    # Kong is the cluster-default IngressClass (Phase 5 — nginx retired). New
    # Ingress objects with no explicit class are picked up by Kong.
    ingressClassAnnotations:
      ingressclass.kubernetes.io/is-default-class: "true"

  proxy:
    enabled: true
    type: LoadBalancer
    # Preserve the real client IP through the AWS LB. With the default "Cluster"
    # policy, kube-proxy SNATs cross-node traffic to the node IP, so Kong sees
    # node IPs and rate-limiting (limit_by: ip) keys on the node — splitting the
    # limit across nodes (effective limit = configured x node count). "Local"
    # removes that cross-node SNAT so the counter is a single coherent bucket.
    externalTrafficPolicy: Local
    # NLB / static-IP / cross-zone annotations go here if needed.
    annotations: {}
    # ── FOLLOW-UP: true per-client rate limiting ──────────────────────────────
    # This is an in-tree Classic ELB (TCP mode): it opens its own connection to
    # the node, so Kong still sees the ELB's IP, not the real client IP. With
    # externalTrafficPolicy: Local the limit is now a single coherent bucket, but
    # keyed on the ELB IP — i.e. effectively GLOBAL, not per-client. For genuine
    # per-client limiting, hand Kong the client IP via Proxy Protocol v2:
    #   annotations:
    #     service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
    #   + Kong proxy listener `proxy_protocol` and env real_ip_header: proxy_protocol
    # (or migrate this Service to an NLB with client-IP preservation).

  # Inject the shared Redis password into the proxy container as REDIS_PASSWORD,
  # sourced from the data-redis Secret. Kong's built-in `env` vault resolves it
  # at runtime via the {vault://env/redis-password} reference in the rate-limit
  # plugins (templates/kong-ratelimit.yaml) — so the password is NEVER rendered
  # in plaintext on the KongClusterPlugin CRs. (customEnv keys are uppercased:
  # redis_password -> REDIS_PASSWORD.)
  customEnv:
    redis_password:
      valueFrom:
        secretKeyRef:
          name: data-redis
          key: redis-password

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # ─── Rate-limit tiers (PHASE 2) ────────────────────────────────────────────
  # Each entry renders one cluster-wide KongClusterPlugin (see
  # templates/kong-ratelimit.yaml). Ingress objects opt in by name via the
  # annotation  konghq.com/plugins: <tier>.  Change a number here + `helm
  # upgrade` and every route referencing the tier updates — no per-Ingress edit.
  # Tune per environment from global-values.yaml (Phase 6).
  rateLimitTiers:
    rl-agg-web:      { minute: 120 }   # / (web BFF/UI)
    rl-agg-api:      { minute: 600 }   # /backend (api)
    rl-agg-auth:     { minute: 20 }    # /auth (keycloak) — tight
    # signals
    rl-signals-api:  { minute: 600 }   # /api
    rl-signals-ui:   { minute: 120 }   # /

  # Shared Redis backing the counters (policy: redis) so the limit stays correct
  # across Kong replicas. host/port point at the common-services Redis; the
  # password is NOT set here — Kong resolves it at runtime from the env vault
  # ({vault://env/redis-password}), fed by customEnv above from the data-redis
  # Secret, so it never lands in plaintext on the KongClusterPlugin CRs.
  redis:
    host: common-services-redis-master.common-services.svc.cluster.local
    port: 6379

  # ─── Prometheus metrics (global) ───────────────────────────────────────────
  # Renders one cluster-wide, GLOBAL KongClusterPlugin (templates/kong-prometheus.yaml)
  # so EVERY route is instrumented automatically — no per-Ingress annotation.
  # Metrics are exposed on Kong's status listener at /metrics; add a Prometheus
  # scrape / ServiceMonitor against the Kong status port to collect them.
  prometheus:
    enabled: true
    # Kong 3.x emits only a minimal metric set by default; opt in to the rest.
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
      per_consumer: false

  # ─── ServiceMonitor: let Prometheus scrape Kong's /metrics ─────────────────
  # The prometheus plugin above exposes metrics on Kong's status listener
  # (port 8100, /metrics) and the ingress controller exposes its own on the
  # cmetrics port. This subchart-native ServiceMonitor targets both. The
  # monitoring chart's Prometheus discovers ServiceMonitors in ALL namespaces
  # (serviceMonitorSelectorNilUsesHelmValues: false), so no extra labels are
  # needed. It selects the proxy Service (labelled enable-metrics: "true" by
  # default) and scrapes the pods behind it. The CRD ships with the monitoring
  # chart, which deploy_all_services installs before common-services.
  serviceMonitor:
    enabled: true
    interval: 30s

# ─── cert-manager subchart values (consumed verbatim) ────────────────────────
# See: https://artifacthub.io/packages/helm/cert-manager/cert-manager
cert-manager:
  enabled: true
  # Install all cert-manager CRDs (Certificate, Issuer, Order, Challenge, ...)
  # via the subchart. Subchart default is `false`, which leaves
  # `challenges.acme.cert-manager.io` missing and breaks ACME HTTP-01 flow.
  crds:
    enabled: true
    # Survive `helm uninstall` so reinstalls don't blow away in-flight orders.
    keep: true
  global:
    leaderElection:
      # cert-manager runs in the platform release namespace; leader election lease lives there too.
      namespace: common-services
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhook:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  cainjector:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Shared data layer — Postgres + Redis for the aggregator-dpg and dpg stacks.
# Consumer charts disable their own DB subcharts and connect via cross-namespace
# FQDN (e.g. platform-postgresql.common-services.svc / platform-redis-master...).
#
# Credentials below are populated at deploy time by the Makefile `platform-install`
# target (reuse-or-generate, then `--set credentials.*`). Left blank in-repo so
# nothing sensitive is committed; templates/secrets.yaml skips rendering when blank.
# =============================================================================
credentials:
  # admin (`postgres` superuser) password
  postgresAdminPassword: ""  # PG_ADMIN_PW
  # per-tenant app passwords
  aggregatorPassword: ""  # AGGREGATOR_PG_PW
  dpgPassword: ""  # DPG_PG_PW
  redisPassword: ""  # REDIS_PW

# -----------------------------------------------------------------------------
# Bitnami Postgres subchart — single shared instance, multi-tenant.
#
# Bootstrap:
#   - `postgres` superuser created by Bitnami initdb using postgresPassword
#   - `auth.username/database` adds the `aggregator` user + DB out of the box
#   - 00-bootstrap.sh creates the `dpg` user, the `dpg` + `keycloak`
#     databases, and pgcrypto/cube/earthdistance extensions for `dpg`
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0
    pullPolicy: IfNotPresent
  architecture: standalone
  auth:
    username: aggregator
    database: aggregator
    existingSecret: data-postgres
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: aggregator-password
  primary:
    persistence:
      enabled: true
      size: 8Gi
    service:
      ports:
        postgresql: 5432
    extraEnvVars:
      - name: DPG_PG_PASSWORD
        valueFrom:
          secretKeyRef:
            name: data-postgres
            key: dpg-password
    initdb:
      scripts:
        00-bootstrap.sh: |
          #!/bin/bash
          set -eu
          echo "[common-services] bootstrapping multi-tenant Postgres"
          # Bitnami exposes the admin password as POSTGRES_POSTGRES_PASSWORD
          # (and the app user's as POSTGRES_PASSWORD). Default socket is /tmp.
          export PGPASSWORD="${POSTGRES_POSTGRES_PASSWORD:-${POSTGRES_PASSWORD}}"
          psql -v ON_ERROR_STOP=1 --username postgres -d postgres <<-SQL
            CREATE USER dpg WITH PASSWORD '${DPG_PG_PASSWORD}';
            CREATE DATABASE keycloak OWNER aggregator;
            CREATE DATABASE dpg OWNER dpg;
          SQL
          psql -v ON_ERROR_STOP=1 --username postgres -d dpg <<-SQL
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS cube;
            CREATE EXTENSION IF NOT EXISTS earthdistance;
          SQL
          echo "[common-services] bootstrap complete"
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 2,    memory: 2Gi   }

# -----------------------------------------------------------------------------
# Bitnami Redis subchart — single shared instance, auth enabled.
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.5
    pullPolicy: IfNotPresent
  architecture: standalone
  auth:
    enabled: true
    existingSecret: data-redis
    existingSecretPasswordKey: redis-password
  commonConfiguration: |-
    appendonly yes
    appendfsync everysec
    save ""
    maxmemory 256mb
    maxmemory-policy allkeys-lru
  master:
    persistence:
      enabled: true
      size: 8Gi
    service:
      ports:
        redis: 6379
    resources:
      requests: { cpu: 50m,  memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
  replica:
    replicaCount: 0

# -----------------------------------------------------------------------------
# NetworkPolicy — restrict ingress on 5432/6379 to namespaces labelled
# `app.kubernetes.io/part-of in (aggregator-dpg, dpg)`. Disable for clusters
# without a NetworkPolicy controller (kind, plain k3s).
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false
  allowedFromNamespaces:
    - aggregator-dpg
    - dpg
