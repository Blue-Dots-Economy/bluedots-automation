# ─────────────────────────────────────────────────────────────────────────────
# Global resource configuration — single source of truth for replica counts,
# HPA, PDB, and container resources across every service.
#
# Keys map directly to subchart names/aliases — Helm forwards them to the
# subchart as .Values.* (same mechanism as global-images.yaml).  No global.*
# nesting or template-side lookup logic needed.
#
# Pass order in install.sh:  -f global-resources.yaml  -f global-images.yaml  -f <env-values>
# Last file wins, so per-environment values can always override these defaults.
# ─────────────────────────────────────────────────────────────────────────────


# ── Signals (dpg) ─────────────────────────────────────────────────────────────
# helm/signals/  →  subchart keys: api, ui, notification-service, match-score

api:
  replicaCount: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi


ui:
  replicaCount: 1

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi


notification-service:
  replicaCount: 1

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi


match-score:
  replicaCount: 1

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi


# search: two deployments (api + worker) sharing one image; resources are nested
# under api.* and worker.* to match the subchart's values structure
search:
  api:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 512Mi

  worker:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 1
        memory: 1Gi


# search-embeddings: TEI embedding model — CPU-heavy, sized accordingly
search-embeddings:
  replicaCount: 1

  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi


# ── Aggregator ────────────────────────────────────────────────────────────────
# helm/aggregator/  →  subchart keys: aggregator-api, web, worker, keycloak
# Note: aggregator's api subchart carries alias "aggregator-api" (Chart.yaml)
# to avoid colliding with signals' api key above when both charts read this file.

aggregator-api:
  replicaCount: 2

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPU: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi


web:
  replicaCount: 1

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi


worker:
  replicaCount: 1

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi


keycloak:
  replicaCount: 1

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPU: 70

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  resources: {}    # keycloak has its own sizing requirements; tune per-cluster in env values


# ── Common services (platform) ────────────────────────────────────────────────
# helm/common-services/ 
kong:
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# cert-manager: controller + webhook + cainjector each sized independently.
cert-manager:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhook:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  cainjector:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# postgresql: DISABLED by default (Postgres migrated to AWS RDS). Kept for
# reference / rollback — used only if postgresql.enabled is flipped back on.
postgresql:
  primary:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi

# redis: shared in-cluster Redis (single master), backs Kong rate-limit counters
# and BullMQ job state. Memory limit must sit above the `maxmemory 512mb` set in
# common-services/values.yaml so `noeviction` has headroom (replication buffers,
# COW on AOF rewrite, client output buffers) before the container itself OOMs.
redis:
  master:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 1Gi

# postgresBootstrap: idempotent post-install Job that creates per-tenant RDS
# roles/databases/extensions. Short-lived, so kept small.
postgresBootstrap:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# metrics-server: required for HPA (and kubectl top). Chart default leaves
# resources unset; give it modest requests so it schedules predictably.
metrics-server:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ingress-nginx: RETIRED (disabled; Kong is the sole controller). Kept only so a
# rollback to nginx has sane sizing.
ingress-nginx:
  controller:
    resources:
      requests:
        cpu: 100m
        memory: 90Mi
      # limits: not set — matches ingress-nginx chart default
