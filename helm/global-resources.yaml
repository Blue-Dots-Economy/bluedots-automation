# ─────────────────────────────────────────────────────────────────────────────
# Global resource configuration — single source of truth for replica counts,
# HPA, PDB, and container resources across every service.  Change values here
# and redeploy; templates fall back to their local chart defaults when a key
# is absent.
# ─────────────────────────────────────────────────────────────────────────────

global:

  # ── Signals (dpg) stack ──────────────────────────────────────────────────

  signals:

    # api: core backend — scaled and guarded for production availability
    api:
      replicaCount: 2

      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
        targetCPUUtilizationPercentage: 80

      podDisruptionBudget:
        enabled: true
        minAvailable: 1

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    # ui: static frontend — single replica is sufficient
    ui:
      replicaCount: 1

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi

    # notification-service: async notifications
    notificationService:
      replicaCount: 1

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    # match-score: scoring worker
    matchScore:
      replicaCount: 1

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPUUtilizationPercentage: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

  # ── Aggregator stack ─────────────────────────────────────────────────────

  aggregator:

    # api: core backend — scaled and guarded for production availability
    api:
      replicaCount: 2

      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 4
        targetCPU: 70

      podDisruptionBudget:
        enabled: true
        minAvailable: 1

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    # web: frontend portal
    web:
      replicaCount: 1

      hpa:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPU: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi

    # worker: background job processor
    worker:
      replicaCount: 1

      hpa:
        enabled: false
        minReplicas: 1
        maxReplicas: 3
        targetCPU: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    # keycloak: identity provider — uses Recreate strategy, keep HPA disabled
    # resources left as chart defaults (keycloak has its own sizing requirements)
    keycloak:
      replicaCount: 1

      hpa:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPU: 70

      podDisruptionBudget:
        enabled: false
        minAvailable: 1
