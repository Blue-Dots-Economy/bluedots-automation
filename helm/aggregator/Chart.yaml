apiVersion: v2
name: aggregator-dpg
description: Blue Dots Aggregator Portal — full stack umbrella chart (web BFF, api, worker, Keycloak). Postgres + Redis are provided by the shared common-services release.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.24.0-0"
keywords:
  - aggregator
  - bluedots
  - onest
  - dpg
  - keycloak
  - bff
home: https://github.com/sanketika-labs/aggregator-dpg
maintainers:
  - name: sanketika
    email: ops@sanketika.in

dependencies:
  - name: ingress-nginx
    version: 4.15.1
    repository: file://charts/ingress-nginx
    condition: ingress-nginx.enabled

  - name: cert-manager
    version: v1.20.2
    repository: file://charts/cert-manager
    condition: cert-manager.enabled

  - name: web
    version: 0.1.0
    repository: file://charts/web

  - name: api
    version: 0.1.0
    repository: file://charts/api

  - name: worker
    version: 0.1.0
    repository: file://charts/worker

  - name: keycloak
    version: 0.1.0
    repository: file://charts/keycloak
