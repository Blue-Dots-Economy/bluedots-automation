# Shared host for the ingress; overridden by the umbrella chart's global
# (Helm propagates parent global to subcharts).
global:
  publicHost: aggregator.example.com

# Template-driven ingress (templates/ingress.yaml): path /backend + strip-path
# are fixed in the template; only these scalars vary. Host = global.publicHost.
ingress:
  enabled: false
  className: ""        # e.g. kong
  plugin: ""           # KongClusterPlugin tier, e.g. rl-agg-api
  annotations: {}

# Per-API (per-resource-group) rate limiting — see
# templates/api-endpoint-groups-ingress.yaml. Each `groups` entry becomes its own
# Kong route (more specific than the /backend catch-all) with its OWN per-IP
# counter. Paths sharing the same effective limit are grouped into ONE generated
# KongPlugin + Ingress, so N APIs with M distinct limits render only M plugins +
# M Ingresses. Renders only when ingress.enabled + ingress.className (kong) are set.
# NOTE: the /backend prefix is stripped by Kong, so each route uses a regex path
# + konghq.com/rewrite to strip ONLY /backend (matching the catch-all's forwarding).
# `path` entries are the segment UNDER /backend (no leading slash, no /backend).
apiRateLimit:
  enabled: true
  defaultMinute: 600   # uniform per-IP requests/min for every API (the one knob; ~10 req/s)
  redis:               # shared common-services Redis Kong uses for counters
    host: common-services-redis-master.common-services.svc.cluster.local
    port: 6379
  # Full coverage — every aggregator-api resource group, all at the uniform
  # default (→ 1 plugin + 1 Ingress). Each prefix is its own Kong route with its
  # OWN per-IP counter and covers all operations beneath it. `public/v1/aggregators`
  # covers the anonymous links/registrations/lookup endpoints. Add a `limit: <n>`
  # on a line only for a rare exception.
  # NOTE: renders only while this chart's ingress is enabled — if aggregator-api
  # is made internal (web BFF proxies to it), the rate-limit Ingress drops too.
  groups:
    - { path: v1/aggregator-registrations }
    - { path: admin/v1/aggregator-registrations }
    - { path: v1/aggregators }
    - { path: v1/bulk-uploads }
    - { path: v1/links }
    - { path: public/v1/aggregators }
    - { path: v1/onboarding }
    - { path: v1/dashboard }
    - { path: v1/aggregator-config }

replicaCount: 1
image:
  repository: aggregator-dpg/api
  tag: ""
  pullPolicy: Always
service:
  port: 4000
resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits:   { cpu: 2,    memory: 1Gi   }
runMigrationsOnBoot: true
bulk:
  uploadUrlTtlSeconds: 900
  uploadMaxBytes: 10485760
  qrDownloadUrlTtlSeconds: 900
adminEmails: "admin@bluedots.local"
publicLinkBaseUrl: ""
serviceAccount:
  create: true
  annotations: {}
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPU: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Pod/container security hardening (#1.12). Mirrors the signals-api baseline:
# non-root uid 1000, drop all Linux capabilities, no privilege escalation.
# Override per-service if an image genuinely needs root (cf. the signals `ui`
# nginx exception in helm/signals/values.yaml).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
