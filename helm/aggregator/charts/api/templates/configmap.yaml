apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "api.appConfigMap" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  PORT: "{{ .Values.service.port }}"
  HOST: "0.0.0.0"
  CORS_ORIGINS: "{{ include "api.publicBaseUrl" . }}"
  RUN_MIGRATIONS_ON_BOOT: "{{ .Values.runMigrationsOnBoot }}"
  ADMIN_EMAILS: "{{ .Values.adminEmails }}"
  PUBLIC_API_URL: "{{ include "api.publicBaseUrl" . }}/backend"
  BULK_UPLOAD_URL_TTL_SECONDS: "{{ .Values.bulk.uploadUrlTtlSeconds }}"
  BULK_UPLOAD_MAX_BYTES: "{{ .Values.bulk.uploadMaxBytes }}"
  QR_DOWNLOAD_URL_TTL_SECONDS: "{{ .Values.bulk.qrDownloadUrlTtlSeconds }}"
  PUBLIC_LINK_BASE_URL: "{{ default (include "api.publicBaseUrl" .) .Values.publicLinkBaseUrl }}"
  # Per-network deployment: every path-dependent var keys off
  # `global.aggregatorNetwork` so flipping it in values-<net>.yaml
  # redirects api + worker at the matching config folder.
  # AGGREGATOR_CONFIG_PATH: "/app/config/{{ .Values.global.aggregatorNetwork }}/aggregator.config.yaml"
  SCHEMA_ROOT_DIR: "/app/config/{{ .Values.global.aggregatorNetwork }}/schemas"
  SIGNALSTACK_ITEM_NETWORK: "{{ .Values.global.aggregatorNetwork }}"
  AGGREGATOR_NETWORK: "{{ .Values.global.aggregatorNetwork }}"
  # Brand skin over the network (UI/config skin). Empty = standard dots.
  AGGREGATOR_BRAND: "{{ .Values.global.aggregatorBrand }}"
  SIGNALSTACK_BASE_URL: "{{ .Values.global.signalstackBaseUrl }}"
  # network_service org id in signal-stack DB; sent as `x-acting-org-id` on
  # admin calls. Without it the login-time upsert fallback fails with
  # SIGNALSTACK_CONFIG_MISSING and dashboard returns SIGNALSTACK_ORG_NOT_REGISTERED.
  SIGNALSTACK_ACTING_ORG_ID: "{{ .Values.global.signalstack.actingOrgId }}"
  S3_FORCE_PATH_STYLE: "{{ .Values.global.s3.forcePathStyle }}"
  ORG_HIERARCHY_ENABLED: "{{ .Values.global.orgHierarchyEnabled }}"
