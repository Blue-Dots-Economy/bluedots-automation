{{- if .Values.ingress.enabled -}}
{{- /*
  Template-driven ingress for the aggregator API. Routing STRUCTURE is fixed
  here: path /backend, strip-path "true" — the api Service listens at root and
  /backend is a public router prefix (replaces the old nginx regex + rewrite).
  Host comes from global.publicHost; className/plugin/annotations from ingress.*.
  No cert-manager annotation: the web ingress owns issuance of the shared host
  cert; this object only references the derived TLS secret.
*/ -}}
{{- $svc := include "api.serviceName" . -}}
{{- $host := required "global.publicHost is required" .Values.global.publicHost -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svc }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "true"
    {{- if .Values.ingress.plugin }}
    konghq.com/plugins: {{ .Values.ingress.plugin | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ printf "%s-tls" ($host | replace "." "-") }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /backend
            pathType: Prefix
            backend:
              service:
                name: {{ $svc }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
