apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.realmConfigMap" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  # Realm JSON kept with placeholders intact — the realm-renderer
  # initContainer substitutes them at pod start.
  aggregator-realm.json: |-
{{ .Files.Get "files/aggregator-realm.json" | indent 4 }}
