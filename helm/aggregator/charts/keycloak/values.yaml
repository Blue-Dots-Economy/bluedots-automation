# Shared host for the ingress; overridden by the umbrella chart's global
# (Helm propagates parent global to subcharts).
global:
  publicHost: aggregator.example.com

# Template-driven ingress (templates/ingress.yaml): path /auth is fixed in the
# template (Keycloak serves natively under /auth). Host = global.publicHost.
ingress:
  enabled: false
  className: ""        # e.g. kong
  plugin: ""           # KongClusterPlugin tier, e.g. rl-agg-auth
  annotations: {}

replicaCount: 1
image:
  repository: aggregator-dpg/keycloak
  tag: '26.5.5-aggregator'
  pullPolicy: IfNotPresent
bootstrapAdminUsername: admin
# When true, container starts with `--optimized` (skips build at runtime).
# Set to false if a build-time SPI option (e.g. KC_SPI_SMS_PROVIDER) is supplied
# at runtime — `--optimized` rejects build-time mismatches and exits.
optimized: true
smsProvider: log
msg91TemplateId: ''
msg91OtpVarName: ''
awsRegion: ap-south-1
service:
  port: 8080
  mgmtPort: 9000
resources:
  requests: { cpu: 250m, memory: 768Mi }
  limits: { cpu: 1, memory: 1500Mi }
realmRenderer:
  image: alpine:3.20

# Theme initContainer — produced by `infra/keycloak/build-theme-image.sh`
# per network. Set `tag` to the network's release tag (e.g.
# `blue_dot-v1`, `purple_dot-v1`); leave `themesInit: null` in values
# (or omit the block) to fall back to the JAR-baked theme.
themesInit:
  image: ghcr.io/blue-dots-economy/aggregator-dpg/keycloak-theme
  tag: blue_dot-develop
  pullPolicy: Always
