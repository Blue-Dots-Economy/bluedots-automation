replicaCount: 1
image:
  repository: aggregator-dpg/worker
  tag: ""
  pullPolicy: IfNotPresent
resources:
  requests: { cpu: 100m, memory: 384Mi }
  limits:   { cpu: 1,    memory: 1Gi   }
bulk:
  maxRows: 10000
  maxRowBytes: 65536
cron:
  linkMetricsRollupIntervalMs: 300000
  watchdogIntervalMs: 3600000
serviceAccount:
  create: true
  annotations: {}

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Pod/container security hardening (#1.12). Mirrors the signals-api baseline:
# non-root uid 1000, drop all Linux capabilities, no privilege escalation.
# Override per-service if an image genuinely needs root (cf. the signals `ui`
# nginx exception in helm/signals/values.yaml).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
