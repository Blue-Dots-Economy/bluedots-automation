replicaCount: 1
image:
  repository: aggregator-dpg/worker
  tag: ""
  pullPolicy: IfNotPresent
resources:
  requests: { cpu: 100m, memory: 384Mi }
  limits:   { cpu: 1,    memory: 1Gi   }
bulk:
  maxRows: 10000
  maxRowBytes: 65536
cron:
  linkMetricsRollupIntervalMs: 300000
  watchdogIntervalMs: 3600000
serviceAccount:
  create: true
  annotations: {}

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1
