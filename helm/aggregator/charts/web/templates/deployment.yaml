{{- /*
  Consent loader path: /app/config/<network>[/<brand>]/schemas/aggregator/consent.json
  (brand path when a brand is set — the loader checks brand → network → default).
  Mounted single-file (subPath) from the umbrella `{release}-consent` ConfigMap.
*/ -}}
{{- $net := .Values.global.aggregatorNetwork -}}
{{- $brand := .Values.global.aggregatorBrand | default "" -}}
{{- $consentPath := printf "/app/config/%s/schemas/aggregator/consent.json" $net -}}
{{- if $brand }}{{- $consentPath = printf "/app/config/%s/%s/schemas/aggregator/consent.json" $net $brand -}}{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web.fullname" . }}
  labels:
    {{- include "web.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "web.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- include "web.imagePullSecrets" . | nindent 6 }}
      {{- include "web.hostAliases" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "web.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "web.globalConfigMap" . }}
            - configMapRef:
                name: {{ include "web.appConfigMap" . }}
          env:
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: SESSION_KEY
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: OIDC_CLIENT_SECRET
            - name: BFF_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: BFF_SERVICE_CLIENT_SECRET
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Consent config overlaid on the loader path. subPath does not
          # hot-update, so a consent change needs a rollout restart (see
          # docs/CONSENT_CONFIGMAP_DEPLOYMENT.md).
          volumeMounts:
            - name: consent
              mountPath: {{ $consentPath }}
              subPath: consent.json
              readOnly: true
      volumes:
        - name: consent
          configMap:
            name: {{ .Release.Name }}-consent
