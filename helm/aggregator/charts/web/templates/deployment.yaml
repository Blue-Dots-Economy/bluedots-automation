apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web.fullname" . }}
  labels:
    {{- include "web.labels" . | nindent 4 }}
spec:
  {{- $hpa := dict }}
  {{- $replicaCount := 0 }}
  {{- $resources := dict }}
  {{- with .Values.global }}{{- with .aggregator }}{{- with .web }}
    {{- if .hpa }}{{- $hpa = .hpa }}{{- end }}
    {{- if .replicaCount }}{{- $replicaCount = .replicaCount }}{{- end }}
    {{- if .resources }}{{- $resources = .resources }}{{- end }}
  {{- end }}{{- end }}{{- end }}
  {{- if not $hpa }}{{- $hpa = .Values.hpa }}{{- end }}
  {{- if not $replicaCount }}{{- $replicaCount = .Values.replicaCount }}{{- end }}
  {{- if not $resources }}{{- $resources = .Values.resources }}{{- end }}
  {{- if not $hpa.enabled }}
  replicas: {{ $replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "web.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- include "web.imagePullSecrets" . | nindent 6 }}
      {{- include "web.hostAliases" . | nindent 6 }}
      containers:
        - name: web
          image: {{ include "web.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "web.globalConfigMap" . }}
            - configMapRef:
                name: {{ include "web.appConfigMap" . }}
          env:
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: SESSION_KEY
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: OIDC_CLIENT_SECRET
            - name: BFF_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: BFF_SERVICE_CLIENT_SECRET
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with $resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
