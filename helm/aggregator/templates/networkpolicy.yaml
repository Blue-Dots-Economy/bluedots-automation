{{- if .Values.networkPolicy.enabled }}
{{- /*
  Ingress-only baseline NetworkPolicy for the aggregator namespace (#1.12).
  Ingress-only on purpose: egress is left unrestricted so app pods keep reaching
  the shared Postgres/Redis in common-services, DNS, Keycloak, and the signals
  API without a second policy to maintain. When enabled, only the listed
  namespaces (+ same namespace) may open connections TO aggregator pods.

  DEFAULT OFF. Validate `allowedFromNamespaces` against your topology before
  enabling. Namespaces are matched on the built-in `kubernetes.io/metadata.name`
  label. `common-services` must stay listed (Kong ingress proxies public
  traffic to web/api/keycloak from there).
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-ingress
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: aggregator-dpg
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
{{- range .Values.networkPolicy.allowedFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
{{- end }}
{{- end }}
