{{- /*
  Umbrella Secret. Skipped when secrets.existingSecret is provided —
  the cluster operator is responsible for creating that Secret with the
  same key names listed below.
*/ -}}
{{- $existing := default .Values.secrets.existingSecret .Values.global.existingSecret -}}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aggregator.secretName" . }}
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Bitnami postgresql looks for these exact key names. These mandatory secrets
  # are guarded: a `change-me` placeholder or empty value fails the render
  # (aggregator.requireSecret) so the platform never deploys on a known default.
  postgres-password: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.postgresPassword "name" "postgresPassword") | quote }}
  password: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.postgresPassword "name" "postgresPassword") | quote }}

  # Application-facing duplicates (api/worker pull POSTGRES_PASSWORD via env).
  POSTGRES_PASSWORD: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.postgresPassword "name" "postgresPassword") | quote }}

  # Shared Redis password (api/worker assemble REDIS_URL from this + REDIS_HOST).
  REDIS_PASSWORD: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.redisPassword "name" "redisPassword") | quote }}

  # Keycloak admin + clients.
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.kcBootstrapAdminPassword "name" "kcBootstrapAdminPassword") | quote }}
  KEYCLOAK_ADMIN_CLIENT_SECRET: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.keycloakAdminClientSecret "name" "keycloakAdminClientSecret") | quote }}
  OIDC_CLIENT_SECRET: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.oidcClientSecret "name" "oidcClientSecret") | quote }}
  # Falls back to the (guarded) admin client secret when unset — no separate guard.
  BFF_SERVICE_CLIENT_SECRET: {{ default .Values.secrets.keycloakAdminClientSecret .Values.secrets.bffServiceClientSecret | quote }}

  # API runtime.
  APPROVAL_TOKEN_SECRET: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.approvalTokenSecret "name" "approvalTokenSecret") | quote }}

  # Web BFF runtime.
  SESSION_KEY: {{ include "aggregator.requireSecret" (dict "value" .Values.secrets.sessionKey "name" "sessionKey") | quote }}

  # SMTP creds (optional — may be empty when using SES/IAM-based auth).
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}

  # Twilio (used only when keycloak.smsProvider=twilio).
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  TWILIO_FROM_NUMBER: {{ .Values.secrets.twilioFromNumber | quote }}

  # MSG91 (used only when keycloak.smsProvider=msg91).
  MSG91_AUTH_KEY: {{ .Values.secrets.msg91AuthKey | quote }}

  # AWS — leave empty when using IRSA / Pod Identity.
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}

  # signals-DPG admin apikey. Empty disables signalstack push at runtime.
  SIGNALSTACK_ADMIN_KEY: {{ .Values.secrets.signalstackAdminKey | quote }}
{{- end }}
