{{- if .Values.ingress.enabled }}
{{- /*
  Two Ingress objects sharing the same host:
    1. `*-api` — strips the /backend/ prefix before forwarding upstream
       (rewrite-target annotation applies to every rule on a single Ingress,
       so /backend has its own object).
    2. `*-main` — verbatim proxying for /auth/, /mail/, and / (catch-all).

  cert-manager fills the TLS secret named `{{ host | replace . - }}-tls`.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aggregator.fullname" . }}-api
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.global.publicHost }}
      secretName: {{ printf "%s-tls" (.Values.global.publicHost | replace "." "-") }}
  rules:
    - host: {{ .Values.global.publicHost }}
      http:
        paths:
          - path: /backend(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "aggregator.fullname" . }}-api
                port:
                  number: {{ .Values.api.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aggregator.fullname" . }}-main
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ .Values.global.publicHost }}
      secretName: {{ printf "%s-tls" (.Values.global.publicHost | replace "." "-") }}
  rules:
    - host: {{ .Values.global.publicHost }}
      http:
        paths:
          # KC_HTTP_RELATIVE_PATH=/auth — Keycloak listens at /auth/* natively,
          # so prefix is preserved through to the upstream Service.
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "aggregator.fullname" . }}-keycloak
                port:
                  number: {{ .Values.keycloak.service.port }}
          # Catch-all — Next.js BFF (must come last).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aggregator.fullname" . }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
