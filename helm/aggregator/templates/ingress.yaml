{{- if .Values.ingress.enabled }}
{{- /*
  Three Ingress objects sharing the same host, routed by the Kong ingress
  controller (IngressClass "kong"). Split per RATE-LIMIT TIER (a single Ingress
  applies one plugin to all its paths, so each tier needs its own object):
    1. `*-api`  — /backend → api. Strips the /backend prefix
       (konghq.com/strip-path: "true"; replaces the nginx regex + rewrite).
       Tier: ingress.apiPlugin.
    2. `*-auth` — /auth → Keycloak. Tight tier to protect login/OTP
       (ingress.authPlugin). Path preserved (strip-path "false"): Keycloak
       serves natively under /auth (KC_HTTP_RELATIVE_PATH=/auth).
    3. `*-web`  — / → Next.js BFF catch-all. Loose tier (ingress.webPlugin) so
       asset-heavy page loads aren't throttled. Path preserved.
  Kong's router prioritises the longer prefix, so /backend and /auth win over /
  even though they live on separate Ingress objects.

  Shared per-route tuning (timeouts) comes from ingress.annotations. Body-size /
  buffers are global Kong proxy config in the common-services release.
  cert-manager fills the TLS secret named `{{ host | replace . - }}-tls`.
*/ -}}
{{- $fullName := include "aggregator.fullname" . }}
{{- $host := .Values.global.publicHost }}
{{- $tlsSecret := printf "%s-tls" ($host | replace "." "-") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-api
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
  annotations:
    # /backend is a public router prefix; the api Service listens at root, so
    # strip it before forwarding (replaces the nginx regex + rewrite-target).
    konghq.com/strip-path: "true"
    {{- if .Values.ingress.apiPlugin }}
    konghq.com/plugins: {{ .Values.ingress.apiPlugin | quote }}
    {{- end }}
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ $tlsSecret }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /backend
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-api
                port:
                  number: {{ .Values.api.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-auth
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
  annotations:
    # Keycloak serves natively under /auth — preserve the prefix, do NOT strip.
    konghq.com/strip-path: "false"
    {{- if .Values.ingress.authPlugin }}
    konghq.com/plugins: {{ .Values.ingress.authPlugin | quote }}
    {{- end }}
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ $tlsSecret }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-keycloak
                port:
                  number: {{ .Values.keycloak.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-web
  labels:
    {{- include "aggregator.labels" . | nindent 4 }}
  annotations:
    # BFF/UI served at root — preserve path.
    konghq.com/strip-path: "false"
    {{- if .Values.ingress.webPlugin }}
    konghq.com/plugins: {{ .Values.ingress.webPlugin | quote }}
    {{- end }}
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ $tlsSecret }}
  rules:
    - host: {{ $host }}
      http:
        paths:
          # Catch-all — Next.js BFF (lowest prefix priority in Kong's router).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-web
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
